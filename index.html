        }

    <div id="fixed-header">
        <h1 class="main-title">The Earth Chronicle</h1>
        <p class="main-subtitle">An Interactive Geologic Time Scale<br><br>Tap to explore</p>
    </div>

    <!-- BOOKMARK: Text  -->
    <div id="scroll-wrapper">
        <div class="image-container">
            <img src="https://lh3.googleusercontent.com/u/0/d/1ME8shAVET8wIKyXYEoc-ukvr30XANR1L" alt="Geologic Time Scale">

            <div class="hotspot" id="cenozoic" data-title="Cenozoic Era" data-desc="<b>Time Span:</b> 66 million years ago to present.<br><br><b>Life:</b> The Age of Mammals. With non-avian dinosaurs gone, mammals and birds diversified explosively to fill vacant ecological roles. Grasses spread globally, reshaping ecosystems. Primates evolved and eventually gave rise to the human lineage.<br><br><b>Geology:</b> The continents reached approximately their modern positions. The collision of India with Asia formed the Himalayas. The Atlantic Ocean continued widening. Antarctica became isolated over the South Pole.<br><br><b>Climate:</b> A long, progressive cooling from early tropical warmth to the repeated glacial cycles of the Pleistocene. CO₂ levels dropped steadily, driving the shift from dense forests to open grasslands across much of the world.<br><br><a href='https://en.wikipedia.org/wiki/Cenozoic' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="holocene" data-title="Holocene Epoch" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1RIA73b-px9AUVqedKk-cQTvqGh26Ghmi' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Time Span:</b> 11,700 years ago to present.<br><br><b>Life:</b> All modern species in their current forms. Dominated by the rapid global spread of Homo sapiens, leading to widespread megafauna extinctions and the first domestication of plants and animals.<br><br><b>Geology:</b> Stable continental positions identical to today. Sea levels rose significantly after the last glacial maximum, reshaping coastlines worldwide.<br><br><b>Climate:</b> Warm and stable interglacial conditions. A slight natural cooling trend over the past 5,000 years has been reversed and is now accelerating due to human industrial activity.<br><br><a href='https://en.wikipedia.org/wiki/Holocene' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="pleistocene" data-title="Pleistocene Epoch" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1jF2on_hcIUUsbrvPGfGHivbPwBaVKOvw' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Time Span:</b> 2.58 million to 11,700 years ago.<br><br><b>Life:</b> Home to the great megafauna - woolly mammoths, woolly rhinoceroses, cave lions, and giant ground sloths. Homo sapiens evolved and spread across every continent, likely contributing to megafauna collapses alongside climate shifts.<br><br><b>Geology:</b> Repeated advance and retreat of massive ice sheets reshaped landscapes across the Northern Hemisphere, carving valleys, depositing moraines, and exposing land bridges including the Bering crossing between Asia and North America.<br><br><b>Climate:</b> Defined by roughly 20 glacial cycles. At peak glaciation, ice sheets covered much of North America and northern Europe, and global sea levels were around 120 metres lower than today.<br><br><a href='https://en.wikipedia.org/wiki/Pleistocene' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="pliocene" data-title="Pliocene Epoch" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1esdgfcaveNULg5fhYz0bCo7bY-acLaEg' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Time Span:</b> 5.3 to 2.6 million years ago.<br><br><b>Life:</b> Early hominins including Australopithecus walked upright across African savannahs. Grasslands expanded at the expense of forests, favouring grazing mammals. Modern genera of many familiar animals - horses, elephants, big cats - were taking shape.<br><br><b>Geology:</b> The Isthmus of Panama fully closed, linking North and South America and triggering the Great American Biotic Interchange. This also redirected ocean currents, significantly altering global climate patterns.<br><br><b>Climate:</b> A cooler and drier world than the Miocene. The closure of the Panama seaway disrupted warm Atlantic circulation, accelerating the onset of Northern Hemisphere glaciation toward the end of the epoch.<br><br><a href='https://en.wikipedia.org/wiki/Pliocene' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="miocene" data-title="Miocene Epoch" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1zQgSQ87mze4gNN3XstDX8Mfj1PtXBeOn' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Time Span:</b> 23 to 5.3 million years ago.<br><br><b>Life:</b> Apes diversified extensively across Africa and Eurasia, including ancestors of the great apes. Grasslands expanded globally, driving the evolution of fast-running grazers. Kelp forests appeared in the oceans, supporting rich new marine ecosystems.<br><br><b>Geology:</b> The collision of Africa with Eurasia closed the ancient Tethys Sea, forming the Mediterranean basin. The Alps and Himalayas continued rising. Antarctica became permanently glaciated as it drifted into full polar isolation.<br><br><b>Climate:</b> Began warm, then cooled progressively. A mid-Miocene warm peak was followed by a sharp cooling around 14 million years ago linked to the growth of the Antarctic ice sheet, marking the transition toward the modern icehouse world.<br><br><a href='https://en.wikipedia.org/wiki/Miocene' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="oligocene" data-title="Oligocene Epoch" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/138krGY2giqejY2prILCZG3SZkUJtg0ne' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Time Span:</b> 34 to 23 million years ago.<br><br><b>Life:</b> Early horses, rhinoceroses, and elephants appeared and diversified. Dense tropical forests retreated, replaced by open woodlands and the earliest grasslands. Marine life flourished, with whales becoming fully aquatic during this period.<br><br><b>Geology:</b> Antarctica fully separated from South America, opening the Drake Passage and establishing the circumpolar current. Europe and Asia continued to converge. The landscape became drier and more open across many mid-latitude regions.<br><br><b>Climate:</b> A major cooling event at the start of the epoch, linked to the opening of the Drake Passage, drove a sharp drop in global temperatures. Permanent Antarctic ice sheets formed for the first time, lowering sea levels noticeably.<br><br><a href='https://en.wikipedia.org/wiki/Oligocene' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="eocene" data-title="Eocene Epoch" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1Jt5qt5vcO6yb7L8AYouA2KUozmESP6_X' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Time Span:</b> 56 to 34 million years ago.<br><br><b>Life:</b> Early forms of horses, whales, bats, and primitive primates emerged. Dense tropical and subtropical forests extended to high latitudes, including the Arctic. Modern orders of birds and mammals were establishing themselves across every continent.<br><br><b>Geology:</b> India was actively colliding with Asia, beginning the Himalayan uplift. Australia separated from Antarctica. The North Atlantic continued to widen as Greenland drifted away from Europe.<br><br><b>Climate:</b> Opened with the Paleocene-Eocene Thermal Maximum, the most extreme warming event of the past 66 million years - global temperatures spiked by 5 to 8 degrees Celsius. The epoch then cooled steadily, ending with a sharp glaciation event that triggered the Eocene-Oligocene transition.<br><br><a href='https://en.wikipedia.org/wiki/Eocene' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="paleocene" data-title="Paleocene Epoch" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1DlyEATTjkU0q0jAP_QkpWQsyr-RV-WdW' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Time Span:</b> 66 to 56 million years ago.<br><br><b>Life:</b> The first epoch after the mass extinction. Small, generalised mammals - mostly nocturnal insectivores - began diversifying rapidly into vacant ecological niches. Birds also diversified quickly. True grasses had not yet evolved; the landscape was dominated by ferns and flowering plants in recovery forests.<br><br><b>Geology:</b> The continents were broadly recognisable but more clustered. The Atlantic was narrower. India was an isolated island continent drifting northward toward Asia at speed.<br><br><b>Climate:</b> Warm and relatively uniform across latitudes, with no polar ice. Tropical and subtropical conditions extended well into what is now temperate Europe and North America. CO₂ levels were high following the K-Pg impact and its aftermath.<br><br><a href='https://en.wikipedia.org/wiki/Paleocene' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="k-pg-extinction" data-title="Cretaceous-Paleogene Extinction" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1vhCuGC8hP-6NPH1eZh-2u3v7D-q_TjUX' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Time Span:</b> 66 million years ago.<br><br><b>Cause:</b> A 10 to 15 km asteroid struck the Yucatán Peninsula, releasing energy equivalent to billions of nuclear weapons. Massive wildfires, a years-long impact winter from ejecta blocking sunlight, and subsequent greenhouse warming followed.<br><br><b>Extinctions:</b> Approximately 75% of all species were lost, including all non-avian dinosaurs, pterosaurs, ammonites, mosasaurs, and large marine reptiles. Survivors were largely small-bodied, burrowing, or aquatic animals.<br><br><b>Significance:</b> Ended the Mesozoic Era entirely and reset the trajectory of life on Earth. Without this event, mammals - and eventually humans - would almost certainly never have risen to dominance.<br><br><a href='https://en.wikipedia.org/wiki/Cretaceous%E2%80%93Paleogene_extinction_event' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="mesozoic" data-title="Mesozoic Era" data-desc="<b>Time Span:</b> 252 to 66 million years ago.<br><br><b>Life:</b> The Age of Reptiles. Dinosaurs dominated the land, pterosaurs ruled the skies, and ichthyosaurs and plesiosaurs filled the seas. The first flowering plants, birds, and small mammals also appeared during this era.<br><br><b>Geology:</b> Began with the single supercontinent Pangea, which progressively rifted apart into Laurasia in the north and Gondwana in the south, and eventually into the recognisable continental fragments of today.<br><br><b>Climate:</b> Predominantly warm and ice-free throughout, with high CO₂ levels and sea levels significantly higher than today. There were no permanent polar ice caps, and shallow seas covered large portions of the continents.<br><br><a href='https://en.wikipedia.org/wiki/Mesozoic' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="cretaceous" data-title="Cretaceous Period" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1NLcQX-yTb_k7D_xdkBL77xKcvkhPa8Rq' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Time Span:</b> 145 to 66 million years ago.<br><br><b>Life:</b> The peak of dinosaur diversity - including Tyrannosaurus rex, Triceratops, and Velociraptor. Flowering plants evolved and spread rapidly, transforming the landscape. The first social insects appeared. Small placental and marsupial mammals were present but marginal.<br><br><b>Geology:</b> Gondwana continued to break apart, separating Africa, South America, India, and Antarctica. A vast shallow inland sea split North America in two. The Rocky Mountains began forming toward the end of the period.<br><br><b>Climate:</b> Very warm and largely ice-free, with sea levels among the highest in Earth's history. CO₂ concentrations were several times modern levels. The period ended abruptly with the K-Pg asteroid impact and its devastating consequences.<br><br><a href='https://en.wikipedia.org/wiki/Cretaceous' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="jurassic" data-title="Jurassic Period" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1Rnuy2ok6MkWRO9qihZBbwB0D45uWW_G4' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Time Span:</b> 201 to 145 million years ago.<br><br><b>Life:</b> Dominated by giant sauropod dinosaurs - the largest land animals in Earth's history - alongside predatory theropods. The first birds evolved from small feathered dinosaurs. Conifers, ferns, and cycads formed vast lush forests. Early mammals remained small and largely nocturnal.<br><br><b>Geology:</b> Pangea was actively splitting into Laurasia and Gondwana, with the central Atlantic Ocean beginning to open. Shallow seas spread across Europe and parts of North America. Volcanic activity was widespread along the new rift zones.<br><br><b>Climate:</b> A warm, wet greenhouse world with no polar ice. High humidity and CO₂ supported the dense vegetation that fed the enormous sauropod herds. Seasonal variation was mild compared to today.<br><br><a href='https://en.wikipedia.org/wiki/Jurassic' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="triassic" data-title="Triassic Period" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1oIivBIlrsl7ZID8VwBbmOL9aaKgqbQnZ' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Time Span:</b> 252 to 201 million years ago.<br><br><b>Life:</b> Life slowly recovering from the Great Dying. The first true dinosaurs appeared in the late Triassic, initially as small, bipedal animals. The first mammals also evolved - tiny, nocturnal, and shrew-like. Marine reptiles including ichthyosaurs colonised the oceans.<br><br><b>Geology:</b> Earth was a single landmass, Pangea, with a vast arid interior far from any moderating ocean influence. The Tethys Sea formed a large tropical bay on the eastern side. Extensive red sandstone deserts characterise the geological record of this period.<br><br><b>Climate:</b> Hot and dry across much of the interior, with strong monsoon systems around the coastal margins. No polar ice. The end of the Triassic saw massive volcanic eruptions as Pangea began to rift, triggering another extinction event that cleared the way for dinosaur dominance.<br><br><a href='https://en.wikipedia.org/wiki/Triassic' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="p-t-extinction" data-title="Permian-Triassic Extinction" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1w-xgECTNk86yTNZ5MJL5rn75xJwaqYhy' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Time Span:</b> 252 million years ago.<br><br><b>Cause:</b> Massive volcanic eruptions in what is now Siberia - the Siberian Traps - released enormous quantities of CO₂ and toxic gases over tens of thousands of years, triggering runaway global warming, ocean acidification, and widespread oxygen depletion in the seas.<br><br><b>Extinctions:</b> The most severe extinction in Earth's history. An estimated 96% of marine species and 70% of terrestrial vertebrate species were lost. Entire groups - trilobites, blastoids, most coral lineages - vanished permanently.<br><br><b>Significance:</b> Recovery took approximately 10 million years, far longer than after the K-Pg event. The ecological vacuum left by the Great Dying allowed the archosaurs - ancestors of dinosaurs and crocodilians - to rise to dominance in the Triassic.<br><br><a href='https://en.wikipedia.org/wiki/Permian%E2%80%93Triassic_extinction_event' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="paleozoic" data-title="Paleozoic Era" data-desc="<b>Time Span:</b> 541 to 252 million years ago.<br><br><b>Life:</b> Began with the Cambrian Explosion of marine animal diversity and ended with the most severe mass extinction in Earth's history. Over this era, life colonised the land, forests appeared, insects took flight, and the first vertebrates crawled ashore as tetrapods.<br><br><b>Geology:</b> Multiple continental collisions gradually assembled the supercontinent Pangea by the end of the era. The Appalachian and Caledonian mountain chains formed during this period, rivalling the modern Himalayas in height.<br><br><b>Climate:</b> Highly variable across its 289-million-year span - from the extreme Ordovician glaciation, through the warm Devonian and Carboniferous greenhouse, to the Permian icehouse and the eventual catastrophic warming of the P-T extinction.<br><br><a href='https://en.wikipedia.org/wiki/Paleozoic' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="permian" data-title="Permian Period" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1Uq70iPwIrUjRkaBkXnhvIcUIJ3Hx4NMH' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Time Span:</b> 299 to 252 million years ago.<br><br><b>Life:</b> Synapsids - the group that would eventually give rise to mammals - were the dominant large land animals, including the sail-backed Dimetrodon. Conifers and seed ferns replaced the coal swamp forests. Insects diversified further, with beetles appearing for the first time.<br><br><b>Geology:</b> Pangea was fully assembled, creating a single vast landmass with an enormous, largely landlocked interior. The Tethys Sea bordered the eastern edge. Extensive glaciers persisted in the southern regions of Gondwana early in the period.<br><br><b>Climate:</b> Transitioned from a cold, glaciated world at the start to increasingly hot and arid conditions as Pangea's interior dried out. Ended catastrophically with the volcanic-driven warming of the P-T extinction event.<br><br><a href='https://en.wikipedia.org/wiki/Permian' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="pennsylvanian" data-title="Late Carboniferous Period" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1gdx-edvvTFWoGCRo4LbaMwrFrtjF2vrT' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Time Span:</b> 323 to 299 million years ago.<br><br><b>Life:</b> Vast coal swamp forests dominated by giant clubmosses, horsetails, and tree ferns up to 30 metres tall. The first reptiles evolved, capable of laying eggs on dry land. Giant insects thrived in the oxygen-rich atmosphere - dragonfly relatives with wingspans of up to 70 cm.<br><br><b>Geology:</b> The collision of Gondwana with Euramerica was actively building the Appalachian and Hercynian mountain ranges. Extensive lowland swamps accumulated the organic material that became most of the world's coal deposits.<br><br><b>Climate:</b> Cool and humid with recurring glaciations in the southern hemisphere. Atmospheric oxygen was significantly higher than today - around 35% compared to the current 21% - fuelling both the giant insects and frequent wildfires visible in the fossil record.<br><br><a href='https://en.wikipedia.org/wiki/Pennsylvanian_(geology)' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="mississippian" data-title="Early Carboniferous Period" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/19RtdNjnliesBofaXvY2qMTIdefuUiQpH' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Time Span:</b> 359 to 323 million years ago.<br><br><b>Life:</b> Warm shallow seas teemed with crinoids, blastoids, and bryozoans, producing thick limestone deposits. Early tetrapods were diversifying on land alongside primitive amphibians. Seed plants began spreading, reducing dependence on water for reproduction.<br><br><b>Geology:</b> High sea levels flooded large continental shelves, particularly across North America and Europe, leaving behind the extensive limestone formations that characterise this period. The landmasses were continuing their slow collision toward Pangea.<br><br><b>Climate:</b> Warm and humid at the start, with high sea levels and widespread tropical seas. Cooling toward the end contributed to a drop in sea levels and the beginnings of the Carboniferous glaciation that would intensify in the Late Carboniferous.<br><br><a href='https://en.wikipedia.org/wiki/Mississippian_(geology)' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="devonian" data-title="Devonian Period" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1wonovQ-93w7lMTlHnDyH13PugY1OKe7s' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Time Span:</b> 419 to 359 million years ago.<br><br><b>Life:</b> Known as the Age of Fish - heavily armoured placoderms including the giant predator Dunkleosteus dominated the seas. On land, the first true forests appeared, and lobe-finned fish began the transition to four-limbed tetrapods. The first seeds also evolved, revolutionising plant reproduction.<br><br><b>Geology:</b> The supercontinent Euramerica formed through the collision of Laurentia and Baltica, throwing up the Caledonian mountain range across what is now Scotland and Scandinavia. Gondwana occupied the southern hemisphere. Widespread reef systems built by stromatoporoids and corals covered tropical shallows.<br><br><b>Climate:</b> Warm and largely ice-free early on. The spread of forests drew down atmospheric CO₂ significantly, cooling the climate toward the end of the period and likely contributing to the Late Devonian extinction, which eliminated around 75% of species.<br><br><a href='https://en.wikipedia.org/wiki/Devonian' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="silurian" data-title="Silurian Period" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1l64QkVP_x12tpLdPuDdYNlGROedlSEuM' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Time Span:</b> 444 to 419 million years ago.<br><br><b>Life:</b> Jawed fish appeared for the first time, a major evolutionary leap. Vascular plants - with true stems for conducting water - colonised the land, accompanied by the first air-breathing arthropods such as millipedes and early arachnids. Coral reefs expanded dramatically in warm shallow seas.<br><br><b>Geology:</b> Sea levels rose significantly after the Ordovician glaciation, flooding continental shelves and creating warm, shallow marine environments. The collision of Avalonia with Laurentia began closing the Iapetus Ocean, laying the groundwork for the later assembly of Euramerica.<br><br><b>Climate:</b> Warm and stable after the severe glaciation that ended the Ordovician. CO₂ levels were high, global temperatures were well above modern averages, and there was no significant polar ice. One of the more climatically uneventful periods in Earth's history.<br><br><a href='https://en.wikipedia.org/wiki/Silurian' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="ordovician" data-title="Ordovician Period" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1BGoBGfTSbGWF-B973gan0pZy2HPFDq4C' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Time Span:</b> 485 to 444 million years ago.<br><br><b>Life:</b> Marine life was extraordinarily diverse - trilobites, brachiopods, cephalopods, and echinoderms dominated the seas. The first primitive land plants - small, moss-like forms - appeared near the shoreline. Jawless fish were present but still marginal.<br><br><b>Geology:</b> Gondwana was the dominant landmass, drifting over the South Pole. The Iapetus Ocean separated it from the smaller continents of Laurentia and Baltica. Widespread shallow tropical seas covered much of the continental shelves.<br><br><b>Climate:</b> Began warm with high CO₂ and sea levels, then ended with a sudden, severe glaciation as Gondwana moved over the South Pole. This glaciation caused a major drop in sea levels and triggered the Late Ordovician mass extinction, the second largest in Earth's history, eliminating around 85% of species.<br><br><a href='https://en.wikipedia.org/wiki/Ordovician' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="cambrian" data-title="Cambrian Period" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/19knfKZNwhB2IDLj2a67RtG8lc0vkm4Pv' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Time Span:</b> 541 to 485 million years ago.<br><br><b>Life:</b> The Cambrian Explosion - one of the most significant events in the history of life. Most major animal body plans appeared within a geologically brief window. Creatures like Anomalocaris, Hallucigenia, and the trilobites populated oxygen-rich seas. Eyes, shells, legs, and gills all evolved in rapid succession.<br><br><b>Geology:</b> The supercontinent Gondwana dominated the southern hemisphere. The continents of Laurentia, Baltica, and Siberia were separate landmasses in tropical to subtropical latitudes. Shallow, warm continental seas were widespread.<br><br><b>Climate:</b> Warm globally, with no evidence of polar ice. High CO₂ levels and warm oceans supported the explosive diversification of marine life. Sea levels were high, flooding large areas of the continents and creating the shallow marine habitats where the Cambrian fauna thrived.<br><br><a href='https://en.wikipedia.org/wiki/Cambrian' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="proterozoic" data-title="Proterozoic Eon" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1puflGlHCgS28ybO4HzdLNcdSLP2Bx_CO' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Time Span:</b> 2.5 billion to 541 million years ago.<br><br><b>Life:</b> The first eukaryotes - cells with a nucleus - appeared around 1.8 billion years ago, a fundamental leap in complexity. The first multicellular organisms followed, culminating in the Ediacaran biota: soft-bodied, enigmatic creatures that represent the earliest known animal-grade life.<br><br><b>Geology:</b> Multiple supercontinent cycles occurred, including the assembly and breakup of Rodinia around 1 billion years ago. Continents were being built and eroded repeatedly. The oldest recognisable mountain belts and sedimentary basins date from this eon.<br><br><b>Climate:</b> Included the most extreme glaciations in Earth's history - the Snowball Earth events, during which ice sheets may have extended to the equator. These were punctuated by warm greenhouse intervals driven by volcanic CO₂ buildup. The Great Oxidation Event around 2.4 billion years ago permanently changed the atmosphere, making complex life eventually possible.<br><br><a href='https://en.wikipedia.org/wiki/Proterozoic' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="archean" data-title="Archean Eon" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/10Tr6IjnPuPfVmJltaAyPSsBz7LGb4eGb' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Time Span:</b> 4 to 2.5 billion years ago.<br><br><b>Life:</b> Life existed, but exclusively as single-celled prokaryotes - bacteria and archaea. Stromatolites, layered mats built by photosynthetic cyanobacteria, are among the earliest fossil evidence of life and were slowly beginning to release oxygen into the atmosphere.<br><br><b>Geology:</b> The first stable continental cratons formed - ancient cores of rock that survive to this day within the hearts of modern continents. The crust was thinner and more mobile than today, with intense volcanism. No large mountain ranges; the surface was dominated by shallow seas and volcanic islands.<br><br><b>Climate:</b> The atmosphere was largely nitrogen and CO₂, with no free oxygen. Despite the Sun being approximately 30% less luminous than today, high greenhouse gas concentrations kept the surface liquid. Temperatures were likely higher than modern averages, with a global ocean covering most of the surface.<br><br><a href='https://en.wikipedia.org/wiki/Archean' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="earth-formation" data-title="Early Earth" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1QwV8g5J4RS84qRaxBKAK6efyeRfyWKpr' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Time Span:</b> 4.54 billion years ago - the Hadean Eon (4.54 to 4 billion years ago).<br><br><b>Life:</b> None. The surface was entirely hostile - a molten or heavily bombarded environment with no stable liquid water for much of this period. Some geochemical evidence tentatively suggests microbial life may have appeared toward the very end of the Hadean, but no confirmed fossils exist.<br><br><b>Geology:</b> Earth accreted from the solar nebula through repeated collisions of planetesimals. A Mars-sized body collided with the proto-Earth, ejecting material that formed the Moon. The surface was largely molten. The oldest known minerals - zircon crystals from Australia - date to around 4.4 billion years ago, suggesting liquid water existed surprisingly early.<br><br><b>Climate:</b> Intense heat from accretion, radioactive decay, and frequent meteorite bombardment kept the surface molten or near-molten. A thick steam and CO₂ atmosphere surrounded the planet. As it gradually cooled, water condensed to form the first oceans - the foundation for everything that followed.<br><br><a href='https://en.wikipedia.org/wiki/Early_Earth' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="pleistocene-species" data-title="Notable Species of the Pleistocene" data-desc="<img src='https://upload.wikimedia.org/wikipedia/commons/thumb/a/ad/Siegsdorfer_Mammut.jpg/960px-Siegsdorfer_Mammut.jpg' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br>The animals below were among the most characteristic large fauna of the Pleistocene, many of which vanished in the late-Pleistocene megafauna extinction.<br><br><a href='https://en.wikipedia.org/wiki/Woolly_mammoth' target='_blank'>Woolly mammoth (Mammuthus primigenius)</a><br><a href='https://en.wikipedia.org/wiki/Woolly_rhinoceros' target='_blank'>Woolly rhinoceros (Coelodonta antiquitatis)</a><br><a href='https://en.wikipedia.org/wiki/Cave_lion' target='_blank'>Cave lion (Panthera spelaea)</a><br><a href='https://en.wikipedia.org/wiki/Smilodon' target='_blank'>Saber-toothed cat (Smilodon fatalis)</a><br><a href='https://en.wikipedia.org/wiki/Giant_ground_sloth' target='_blank'>Giant ground sloth (Megatherium americanum)</a><br><a href='https://en.wikipedia.org/wiki/Irish_elk' target='_blank'>Irish elk (Megaloceros giganteus)</a><br><a href='https://en.wikipedia.org/wiki/Cave_bear' target='_blank'>Cave bear (Ursus spelaeus)</a><br><a href='https://en.wikipedia.org/wiki/Homo_sapiens' target='_blank'>Modern human (Homo sapiens)</a><br><a href='https://en.wikipedia.org/wiki/Neanderthal' target='_blank'>Neanderthal (Homo neanderthalensis)</a><br><a href='https://en.wikipedia.org/wiki/Dire_wolf' target='_blank'>Dire wolf (Aenocyon dirus)</a><br><br>The following plants were widespread across Pleistocene landscapes, particularly during glacial and interglacial cycles.<br><br><a href='https://en.wikipedia.org/wiki/Poaceae' target='_blank'>Grasses (Poaceae family)</a><br><a href='https://en.wikipedia.org/wiki/Betula' target='_blank'>Birch (Betula)</a><br><a href='https://en.wikipedia.org/wiki/Pinus' target='_blank'>Pine (Pinus)</a><br><a href='https://en.wikipedia.org/wiki/Picea' target='_blank'>Spruce (Picea)</a><br><a href='https://en.wikipedia.org/wiki/Salix' target='_blank'>Willow (Salix)</a><br><a href='https://en.wikipedia.org/wiki/Artemisia_(plant)' target='_blank'>Sagebrush (Artemisia)</a><br><a href='https://en.wikipedia.org/wiki/Quercus' target='_blank'>Oak (Quercus)</a><br><a href='https://en.wikipedia.org/wiki/Alnus' target='_blank'>Alder (Alnus)</a><br><a href='https://en.wikipedia.org/wiki/Carex' target='_blank'>Sedge (Carex)</a><br><a href='https://en.wikipedia.org/wiki/Equisetum' target='_blank'>Horsetail (Equisetum)</a>"></div>

            <div class="hotspot" id="pliocene-species" data-title="Notable Species of the Pliocene" data-desc="<img src='https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Mrs_Ples_Face.jpg/960px-Mrs_Ples_Face.jpg' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br>The animals below represent the dominant and most significant fauna of the Pliocene, a period of active hominin evolution and faunal exchange between continents.<br><br><a href='https://en.wikipedia.org/wiki/Australopithecus' target='_blank'>Australopithecus (Australopithecus afarensis)</a><br><a href='https://en.wikipedia.org/wiki/Mammut' target='_blank'>American mastodon (Mammut americanum)</a><br><a href='https://en.wikipedia.org/wiki/Pliohippus' target='_blank'>Pliocene horse (Pliohippus)</a><br><a href='https://en.wikipedia.org/wiki/Smilodon' target='_blank'>Saber-toothed cat (Smilodon)</a><br><a href='https://en.wikipedia.org/wiki/Sivatherium' target='_blank'>Sivatherium (Sivatherium giganteum)</a><br><a href='https://en.wikipedia.org/wiki/Dinofelis' target='_blank'>Dinofelis (Dinofelis barlowi)</a><br><a href='https://en.wikipedia.org/wiki/Megatherium' target='_blank'>Giant ground sloth (Megatherium)</a><br><a href='https://en.wikipedia.org/wiki/Mammuthus' target='_blank'>Early mammoth (Mammuthus meridionalis)</a><br><a href='https://en.wikipedia.org/wiki/Agriotherium' target='_blank'>Giant bear (Agriotherium africanum)</a><br><a href='https://en.wikipedia.org/wiki/Paracamelus' target='_blank'>Pliocene camel (Paracamelus)</a><br><br>The following plants were widespread across Pliocene landscapes, which were transitioning from forests to open grasslands.<br><br><a href='https://en.wikipedia.org/wiki/Poaceae' target='_blank'>Grasses (Poaceae family)</a><br><a href='https://en.wikipedia.org/wiki/Acacia' target='_blank'>Acacia (Acacia)</a><br><a href='https://en.wikipedia.org/wiki/Quercus' target='_blank'>Oak (Quercus)</a><br><a href='https://en.wikipedia.org/wiki/Sequoia' target='_blank'>Sequoia (Sequoia)</a><br><a href='https://en.wikipedia.org/wiki/Pinus' target='_blank'>Pine (Pinus)</a><br><a href='https://en.wikipedia.org/wiki/Magnolia' target='_blank'>Magnolia (Magnolia)</a><br><a href='https://en.wikipedia.org/wiki/Ficus' target='_blank'>Fig (Ficus)</a><br><a href='https://en.wikipedia.org/wiki/Arecaceae' target='_blank'>Palms (Arecaceae)</a><br><a href='https://en.wikipedia.org/wiki/Ginkgo' target='_blank'>Ginkgo (Ginkgo biloba)</a><br><a href='https://en.wikipedia.org/wiki/Acer' target='_blank'>Maple (Acer)</a>"></div>

            <div class="hotspot" id="miocene-species" data-title="Notable Species of the Miocene" data-desc="<img src='https://upload.wikimedia.org/wikipedia/commons/thumb/0/02/Dryopithecus_fontani_mio_med_francia.JPG/960px-Dryopithecus_fontani_mio_med_francia.JPG' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br>The animals below represent the dominant fauna of the Miocene, a period of extensive ape diversification and the global spread of grasslands.<br><br><a href='https://en.wikipedia.org/wiki/Dryopithecus' target='_blank'>Early ape (Dryopithecus)</a><br><a href='https://en.wikipedia.org/wiki/Merychippus' target='_blank'>Miocene horse (Merychippus)</a><br><a href='https://en.wikipedia.org/wiki/Gomphotherium' target='_blank'>Gomphothere (Gomphotherium)</a><br><a href='https://en.wikipedia.org/wiki/Deinotherium' target='_blank'>Deinotherium (Deinotherium giganteum)</a><br><a href='https://en.wikipedia.org/wiki/Amphicyon' target='_blank'>Bear-dog (Amphicyon)</a><br><a href='https://en.wikipedia.org/wiki/Sivapithecus' target='_blank'>Sivapithecus (Sivapithecus)</a><br><a href='https://en.wikipedia.org/wiki/Proconsul_(primate)' target='_blank'>Proconsul (Proconsul africanus)</a><br><a href='https://en.wikipedia.org/wiki/Moropus' target='_blank'>Moropus (Moropus elatus)</a><br><a href='https://en.wikipedia.org/wiki/Paraceratherium' target='_blank'>Giant rhinoceros (Paraceratherium)</a><br><a href='https://en.wikipedia.org/wiki/Megalodon' target='_blank'>Megalodon (Otodus megalodon)</a><br><br>The following plants dominated Miocene landscapes, with grasses expanding dramatically during this epoch.<br><br><a href='https://en.wikipedia.org/wiki/Poaceae' target='_blank'>Grasses (Poaceae family)</a><br><a href='https://en.wikipedia.org/wiki/Macrocystis' target='_blank'>Giant kelp (Macrocystis pyrifera)</a><br><a href='https://en.wikipedia.org/wiki/Quercus' target='_blank'>Oak (Quercus)</a><br><a href='https://en.wikipedia.org/wiki/Pinus'             <div class="hotspot" id="oligocene-species" data-title="Notable Species of the Oligocene" data-desc="<img src='https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Mesohippus_barbouri_Harvard.jpg/960px-Mesohippus_barbouri_Harvard.jpg' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br>The animals below were among the most significant fauna of the Oligocene, a period when mammals diversified rapidly following the cooling of the Eocene.<br><br><a href='https://en.wikipedia.org/wiki/Mesohippus' target='_blank'>Early horse (Mesohippus)</a><br><a href='https://en.wikipedia.org/wiki/Paraceratherium' target='_blank'>Paraceratherium - largest land mammal ever (Paraceratherium transouralicum)</a><br><a href='https://en.wikipedia.org/wiki/Entelodon' target='_blank'>Entelodont / Hell pig (Entelodon)</a><br><a href='https://en.wikipedia.org/wiki/Dorudon' target='_blank'>Early whale (Dorudon)</a><br><a href='https://en.wikipedia.org/wiki/Nimravus' target='_blank'>False saber-tooth (Nimravus)</a><br><a href='https://en.wikipedia.org/wiki/Cynodictis' target='_blank'>Early dog ancestor (Cynodictis)</a><br><a href='https://en.wikipedia.org/wiki/Archaeotherium' target='_blank'>Archaeotherium (Archaeotherium mortoni)</a><br><a href='https://en.wikipedia.org/wiki/Anthracotherium' target='_blank'>Anthracothere (Anthracotherium)</a><br><a href='https://en.wikipedia.org/wiki/Hyaenodon' target='_blank'>Hyaenodon (Hyaenodon horridus)</a><br><a href='https://en.wikipedia.org/wiki/Oreodont' target='_blank'>Oreodont (Merycoidodon)</a><br><br>The following plants were widespread across Oligocene landscapes, with tropical forests retreating and open woodlands expanding.<br><br><a href='https://en.wikipedia.org/wiki/Quercus' target='_blank'>Oak (Quercus)</a><br><a href='https://en.wikipedia.org/wiki/Fagus' target='_blank'>Beech (Fagus)</a><br><a href='https://en.wikipedia.org/wiki/Sequoia' target='_blank'>Sequoia (Sequoia)</a><br><a href='https://en.wikipedia.org/wiki/Arecaceae' target='_blank'>Palms (Arecaceae)</a><br><a href='https://en.wikipedia.org/wiki/Ficus' target='_blank'>Fig (Ficus)</a><br><a href='https://en.wikipedia.org/wiki/Magnolia' target='_blank'>Magnolia (Magnolia)</a><br><a href='https://en.wikipedia.org/wiki/Ginkgo' target='_blank'>Ginkgo (Ginkgo biloba)</a><br><a href='https://en.wikipedia.org/wiki/Pinus' target='_blank'>Pine (Pinus)</a><br><a href='https://en.wikipedia.org/wiki/Poaceae' target='_blank'>Early grasses (Poaceae)</a><br><a href='https://en.wikipedia.org/wiki/Polypodiopsida' target='_blank'>Fern (Polypodiopsida)</a>"></div>

            <div class="hotspot" id="eocene-species" data-title="Notable Species of the Eocene" data-desc="<img src='https://upload.wikimedia.org/wikipedia/commons/thumb/3/39/Pachycetus_paulsoni.png/960px-Pachycetus_paulsoni.png' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br>The animals below were among the most significant fauna of the Eocene, when the foundations of modern mammal orders were being established.<br><br><a href='https://en.wikipedia.org/wiki/Pachycetus' target='_blank'>Early whale (Pachycetus)</a><br><a href='https://en.wikipedia.org/wiki/Hyracotherium' target='_blank'>Early horse (Hyracotherium)</a><br><a href='https://en.wikipedia.org/wiki/Uintatherium' target='_blank'>Uintatherium (Uintatherium anceps)</a><br><a href='https://en.wikipedia.org/wiki/Andrewsarchus' target='_blank'>Andrewsarchus (Andrewsarchus mongoliensis)</a><br><a href='https://en.wikipedia.org/wiki/Gastornis' target='_blank'>Terror bird (Gastornis)</a><br><a href='https://en.wikipedia.org/wiki/Ambulocetus' target='_blank'>Walking whale (Ambulocetus)</a><br><a href='https://en.wikipedia.org/wiki/Brontotheriidae' target='_blank'>Brontothere (Brontotheriidae)</a><br><a href='https://en.wikipedia.org/wiki/Creodonta' target='_blank'>Creodont (Creodonta)</a><br><a href='https://en.wikipedia.org/wiki/Mesonyx' target='_blank'>Mesonyx (Mesonyx obtusidens)</a><br><a href='https://en.wikipedia.org/wiki/Propalaeotherium' target='_blank'>Propalaeotherium (Propalaeotherium)</a><br><br>The following plants dominated the warm, humid Eocene world, with tropical forests extending to high latitudes.<br><br><a href='https://en.wikipedia.org/wiki/Nypa_fruticans' target='_blank'>Nipa palm (Nypa fruticans)</a><br><a href='https://en.wikipedia.org/wiki/Ficus' target='_blank'>Fig (Ficus)</a><br><a href='https://en.wikipedia.org/wiki/Magnolia' target='_blank'>Magnolia (Magnolia)</a><br><a href='https://en.wikipedia.org/wiki/Sequoia' target='_blank'>Sequoia (Sequoia)</a><br><a href='https://en.wikipedia.org/wiki/Ginkgo' target='_blank'>Ginkgo (Ginkgo biloba)</a><br><a href='https://en.wikipedia.org/wiki/Fagus' target='_blank'>Beech (Fagus)</a><br><a href='https://en.wikipedia.org/wiki/Cycad' target='_blank'>Cycad (Cycadophyta)</a><br><a href='https://en.wikipedia.org/wiki/Polypodiopsida' target='_blank'>Fern (Polypodiopsida)</a><br><a href='https://en.wikipedia.org/wiki/Arecaceae' target='_blank'>Palms (Arecaceae)</a><br><a href='https://en.wikipedia.org/wiki/Quercus' target='_blank'>Early oak (Quercus)</a>"></div>

            <div class="hotspot" id="paleocene-species" data-title="Notable Species of the Paleocene" data-desc="<img src='https://upload.wikimedia.org/wikipedia/commons/thumb/a/a1/Plesiadapis_UMMNH.jpg/960px-Plesiadapis_UMMNH.jpg' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br>The animals below represent the earliest post-extinction fauna - small, generalised mammals that began filling the ecological vacuum left by the non-avian dinosaurs.<br><br><a href='https://en.wikipedia.org/wiki/Plesiadapis' target='_blank'>Early primate (Plesiadapis)</a><br><a href='https://en.wikipedia.org/wiki/Pantodonta' target='_blank'>Pantodont (Pantodonta)</a><br><a href='https://en.wikipedia.org/wiki/Condylarthra' target='_blank'>Condylarth (Condylarthra)</a><br><a href='https://en.wikipedia.org/wiki/Gastornis' target='_blank'>Terror bird (Gastornis)</a><br><a href='https://en.wikipedia.org/wiki/Taeniodonta' target='_blank'>Taeniodont (Taeniodonta)</a><br><a href='https://en.wikipedia.org/wiki/Multituberculata' target='_blank'>Multituberculate (Multituberculata)</a><br><a href='https://en.wikipedia.org/wiki/Champsosaurus' target='_blank'>Champsosaurus (Champsosaurus)</a><br><a href='https://en.wikipedia.org/wiki/Mesonychidae' target='_blank'>Mesonychid (Mesonychidae)</a><br><a href='https://en.wikipedia.org/wiki/Tillodontia' target='_blank'>Tillodont (Tillodontia)</a><br><a href='https://en.wikipedia.org/wiki/Creodonta' target='_blank'>Creodont (Creodonta)</a><br><br>The following plants dominated Paleocene landscapes, recovering rapidly from the K-Pg extinction event.<br><br><a href='https://en.wikipedia.org/wiki/Polypodiopsida' target='_blank'>Fern (Polypodiopsida)</a><br><a href='https://en.wikipedia.org/wiki/Magnolia' target='_blank'>Magnolia (Magnolia)</a><br><a href='https://en.wikipedia.org/wiki/Arecaceae' target='_blank'>Palms (Arecaceae)</a><br><a href='https://en.wikipedia.org/wiki/Sequoia' target='_blank'>Sequoia (Sequoia)</a><br><a href='https://en.wikipedia.org/wiki/Ginkgo' target='_blank'>Ginkgo (Ginkgo biloba)</a><br><a href='https://en.wikipedia.org/wiki/Cycad' target='_blank'>Cycad (Cycadophyta)</a><br><a href='https://en.wikipedia.org/wiki/Fagus' target='_blank'>Beech (Fagus)</a><br><a href='https://en.wikipedia.org/wiki/Ficus' target='_blank'>Fig (Ficus)</a><br><a href='https://en.wikipedia.org/wiki/Equisetum' target='_blank'>Horsetail (Equisetum)</a><br><a href='https://en.wikipedia.org/wiki/Platanus' target='_blank'>Plane tree (Platanus)</a>"></div>

            <div class="hotspot" id="cretaceous-species" data-title="Notable Species of the Cretaceous" data-desc="<img src='https://upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Scotty_Tyrannosaurus.jpg/960px-Scotty_Tyrannosaurus.jpg' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br>The animals below represent the iconic fauna of the Cretaceous - the peak of dinosaur diversity, ending with the K-Pg mass extinction 66 million years ago.<br><br><a href='https://en.wikipedia.org/wiki/Tyrannosaurus' target='_blank'>Tyrannosaurus rex (Tyrannosaurus rex)</a><br><a href='https://en.wikipedia.org/wiki/Triceratops' target='_blank'>Triceratops (Triceratops horridus)</a><br><a href='https://en.wikipedia.org/wiki/Velociraptor' target='_blank'>Velociraptor (Velociraptor mongoliensis)</a><br><a href='https://en.wikipedia.org/wiki/Spinosaurus' target='_blank'>Spinosaurus (Spinosaurus aegyptiacus)</a><br><a href='https://en.wikipedia.org/wiki/Mosasaurus' target='_blank'>Mosasaurus (Mosasaurus hoffmannii)</a><br><a href='https://en.wikipedia.org/wiki/Pteranodon' target='_blank'>Pteranodon (Pteranodon longiceps)</a><br><a href='https://en.wikipedia.org/wiki/Ankylosaurus' target='_blank'>Ankylosaurus (Ankylosaurus magniventris)</a><br><a href='https://en.wikipedia.org/wiki/Pachycephalosaurus' target='_blank'>Pachycephalosaurus (Pachycephalosaurus wyomingensis)</a><br><a href='https://en.wikipedia.org/wiki/Edmontosaurus' target='_blank'>Edmontosaurus (Edmontosaurus regalis)</a><br><a href='https://en.wikipedia.org/wiki/Elasmosaurus' target='_blank'>Elasmosaurus (Elasmosaurus platyurus)</a><br><br>The following plants were widespread during the Cretaceous, most notably the explosive diversification of flowering plants.<br><br><a href='https://en.wikipedia.org/wiki/Flowering_plant' target='_blank'>Flowering plants (Angiosperms)</a><br><a href='https://en.wikipedia.org/wiki/Magnolia' target='_blank'>Magnolia (Magnolia)</a><br><a href='https://en.wi             <div class="hotspot" id="jurassic-species" data-title="Notable Species of the Jurassic" data-desc="<img src='https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Brachiosaurus_skull_cast_Denver_3.jpg/960px-Brachiosaurus_skull_cast_Denver_3.jpg' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br>The animals below represent the iconic fauna of the Jurassic - dominated by enormous sauropods, predatory theropods, and the first birds.<br><br><a href='https://en.wikipedia.org/wiki/Brachiosaurus' target='_blank'>Brachiosaurus (Brachiosaurus altithorax)</a><br><a href='https://en.wikipedia.org/wiki/Stegosaurus' target='_blank'>Stegosaurus (Stegosaurus stenops)</a><br><a href='https://en.wikipedia.org/wiki/Allosaurus' target='_blank'>Allosaurus (Allosaurus fragilis)</a><br><a href='https://en.wikipedia.org/wiki/Diplodocus' target='_blank'>Diplodocus (Diplodocus carnegii)</a><br><a href='https://en.wikipedia.org/wiki/Archaeopteryx' target='_blank'>Archaeopteryx - first bird (Archaeopteryx lithographica)</a><br><a href='https://en.wikipedia.org/wiki/Pterodactylus' target='_blank'>Pterodactylus (Pterodactylus antiquus)</a><br><a href='https://en.wikipedia.org/wiki/Ichthyosaurus' target='_blank'>Ichthyosaurus (Ichthyosaurus communis)</a><br><a href='https://en.wikipedia.org/wiki/Plesiosaurus' target='_blank'>Plesiosaurus (Plesiosaurus dolichodeirus)</a><br><a href='https://en.wikipedia.org/wiki/Compsognathus' target='_blank'>Compsognathus (Compsognathus longipes)</a><br><a href='https://en.wikipedia.org/wiki/Ceratosaurus' target='_blank'>Ceratosaurus (Ceratosaurus nasicornis)</a><br><br>The following plants covered the lush, warm Jurassic world with dense forests - flowering plants had not yet evolved.<br><br><a href='https://en.wikipedia.org/wiki/Cycad' target='_blank'>Cycad (Cycadophyta)</a><br><a href='https://en.wikipedia.org/wiki/Araucaria' target='_blank'>Araucaria (Araucaria)</a><br><a href='https://en.wikipedia.org/wiki/Ginkgo' target='_blank'>Ginkgo (Ginkgo biloba)</a><br><a href='https://en.wikipedia.org/wiki/Polypodiopsida' target='_blank'>Fern (Polypodiopsida)</a><br><a href='https://en.wikipedia.org/wiki/Equisetum' target='_blank'>Horsetail (Equisetum)</a><br><a href='https://en.wikipedia.org/wiki/Bennettitales' target='_blank'>Bennettitales (Bennettitales)</a><br><a href='https://en.wikipedia.org/wiki/Tree_fern' target='_blank'>Tree fern (Cyatheales)</a><br><a href='https://en.wikipedia.org/wiki/Sequoia' target='_blank'>Sequoia ancestor (Sequoia)</a><br><a href='https://en.wikipedia.org/wiki/Cheirolepidiaceae' target='_blank'>Cheirolepidiaceae conifer (Cheirolepidiaceae)</a><br><a href='https://en.wikipedia.org/wiki/Lycopodium' target='_blank'>Club moss (Lycopodium)</a>"></div>

            <div class="hotspot" id="triassic-species" data-title="Notable Species of the Triassic" data-desc="<img src='https://upload.wikimedia.org/wikipedia/commons/thumb/5/57/Coelophysis_bauri_mount.jpg/960px-Coelophysis_bauri_mount.jpg' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br>The animals below represent the fauna of the Triassic - a world recovering from the Great Dying, where the first dinosaurs and mammals appeared.<br><br><a href='https://en.wikipedia.org/wiki/Coelophysis' target='_blank'>Coelophysis - early dinosaur (Coelophysis bauri)</a><br><a href='https://en.wikipedia.org/wiki/Plateosaurus' target='_blank'>Plateosaurus (Plateosaurus engelhardti)</a><br><a href='https://en.wikipedia.org/wiki/Eoraptor' target='_blank'>Eoraptor - earliest dinosaur (Eoraptor lunensis)</a><br><a href='https://en.wikipedia.org/wiki/Postosuchus' target='_blank'>Postosuchus (Postosuchus kirkpatricki)</a><br><a href='https://en.wikipedia.org/wiki/Nothosaurus' target='_blank'>Nothosaurus (Nothosaurus)</a><br><a href='https://en.wikipedia.org/wiki/Tanystropheus' target='_blank'>Tanystropheus (Tanystropheus hydroides)</a><br><a href='https://en.wikipedia.org/wiki/Cynognathus' target='_blank'>Cynognathus - mammal-like reptile (Cynognathus crateronotus)</a><br><a href='https://en.wikipedia.org/wiki/Shonisaurus' target='_blank'>Shonisaurus - giant ichthyosaur (Shonisaurus popularis)</a><br><a href='https://en.wikipedia.org/wiki/Megazostrodon' target='_blank'>Megazostrodon - early mammal (Megazostrodon rudnerae)</a><br><a href='https://en.wikipedia.org/wiki/Lystrosaurus' target='_blank'>Lystrosaurus (Lystrosaurus murrayi)</a><br><br>The following plants dominated the dry, hot Triassic world - flowering plants had not yet appeared.<br><br><a href='https://en.wikipedia.org/wiki/Cycad' target='_blank'>Cycad (Cycadophyta)</a><br><a href='https://en.wikipedia.org/wiki/Conifer' target='_blank'>Conifer (Pinophyta)</a><br><a href='https://en.wikiped             <div class="hotspot" id="permian-species" data-title="Notable Species of the Permian" data-desc="<img src='https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Dimetrodon_incisivum_01.jpg/960px-Dimetrodon_incisivum_01.jpg' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br>The animals below represent the dominant fauna of the Permian, which ended with the most severe mass extinction in Earth's history - the Great Dying.<br><br><a href='https://en.wikipedia.org/wiki/Dimetrodon' target='_blank'>Dimetrodon (Dimetrodon limbatus)</a><br><a href='https://en.wikipedia.org/wiki/Edaphosaurus' target='_blank'>Edaphosaurus (Edaphosaurus pogonias)</a><br><a href='https://en.wikipedia.org/wiki/Gorgonopsia' target='_blank'>Gorgonopsid (Gorgonopsia)</a><br><a href='https://en.wikipedia.org/wiki/Lystrosaurus' target='_blank'>Lystrosaurus (Lystrosaurus murrayi)</a><br><a href='https://en.wikipedia.org/wiki/Scutosaurus' target='_blank'>Scutosaurus (Scutosaurus karpinskii)</a><br><a href='https://en.wikipedia.org/wiki/Dicynodon' target='_blank'>Dicynodon (Dicynodon lacerticeps)</a><br><a href='https://en.wikipedia.org/wiki/Moschops' target='_blank'>Moschops (Moschops capensis)</a><br><a href='https://en.wikipedia.org/wiki/Anteosaurus' target='_blank'>Anteosaurus (Anteosaurus magnificus)</a><br><a href='https://en.wikipedia.org/wiki/Mesosaurus' target='_blank'>Mesosaurus (Mesosaurus tenuidens)</a><br><a href='https://en.wikipedia.org/wiki/Bradysaurus' target='_blank'>Bradysaurus (Bradysaurus baini)</a><br><br>The following plants dominated Permian landscapes, with Gondwana's coal swamp forests giving way to drier conifer woodland.<br><br><a href='https://en.wikipedia.org/wiki/Glossopteris' target='_blank'>Glossopteris seed fern (Glossopteris)</a><br><a href='https://en.wikipedia.org/wiki/Gangamopteris' target='_blank'>Gangamopteris (Gangamopteris)</a><br><a href='https://en.wikipedia.org/wiki/Conifer' target='_blank'>Conifer (Walchiace             <div class="hotspot" id="pennsylvanian-species" data-title="Notable Species of the Pennsylvanian" data-desc="<img src='https://upload.wikimedia.org/wikipedia/commons/thumb/a/a8/Arthropleura_sp._MNHN.F.SOT002122.jpg/960px-Arthropleura_sp._MNHN.F.SOT002122.jpg' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br>The animals below represent the fauna of the Pennsylvanian, an oxygen-rich world of vast coal swamps where giant insects ruled the air and the first reptiles appeared.<br><br><a href='https://en.wikipedia.org/wiki/Arthropleura' target='_blank'>Arthropleura - giant millipede (Arthropleura armata)</a><br><a href='https://en.wikipedia.org/wiki/Meganeura' target='_blank'>Meganeura - giant dragonfly (Meganeura monyi)</a><br><a href='https://en.wikipedia.org/wiki/Eryops' target='_blank'>Eryops - early amphibian (Eryops megacephalus)</a><br><a href='https://en.wikipedia.org/wiki/Hylonomus' target='_blank'>Hylonomus - earliest reptile (Hylonomus lyelli)</a><br><a href='https://en.wikipedia.org/wiki/Ophiacodon' target='_blank'>Ophiacodon (Ophiacodon uniformis)</a><br><a href='https://en.wikipedia.org/wiki/Petrolacosaurus' target='_blank'>Petrolacosaurus (Petrolacosaurus kansensis)</a><br><a href='https://en.wikipedia.org/wiki/Proterogyrinus' target='_blank'>Proterogyrinus (Proterogyrinus scheelei)</a><br><a href='https://en.wikipedia.org/wiki/Westlothiana' target='_blank'>Westlothiana (Westlothiana lizziae)</a><br><a href='https://en.wikipedia.org/wiki/Edaphosaurus' target='_blank'>Early Edaphosaurus (Edaphosaurus)</a><br><a href='https://en.wikipedia.org/wiki/Bandringa' target='_blank'>Bandringa shark (Bandringa)</a><br><br>The following plants built the vast coal swamp forests of the Pennsylvanian, whose buried remains became most of the world's coal deposits.<br><br><a href='https://en.wikipedia.org/wiki/Lepidodendron' target='_blank'>Scale tree (Lepidodendron)</a><br><a href='https://en.wikipedia.org/wiki/Sigillaria' target='_blank'>Sigillaria (Sigillaria)</a><br><a href='https://en.wikipedia.org/wiki/Calamites' target='_blank'>Giant horsetail (Calamites)</a><br><a href='https://en.wikipedia.org/wiki/Cordaitales' target='_blank'>Cordaitalean tree (Cordaitales)</a><br><a href='https://en.wikipedia.org/wiki/Medullosa' target='_blank'>Medullosa seed fern (Medullosa)</a><br><a href='https://en.wikipedia.org/wiki/Psaronius' target='_blank'>Tree fern (Psaronius)</a><br><a href='https://en.wikipedia.org/wiki/Neuropteris' target='_blank'>Neuropteris fern (Neuropteris)</a><br><a href='https://en.wikipedia.org/wiki/Alethopteris' target='_blank'>Alethopteris (Alethopteris)</a><br><a href='https://en.wikipedia.org/wiki/Sphenophyllum' target='_blank'>Sphenophyllum (Sphenophyllum)</a><br><a href='https://en.wikipedia.org/wiki/Lycopodium' target='_blank'>Club moss (Lycopodium)</a>"></div>

            <div class="hotspot" id="mississippian-species" data-title="Notable Species of the Mississippian" data-desc="<img src='https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Agaricocrinus_americanus_Carboniferous_Indiana.jpg/960px-Agaricocrinus_americanus_Carboniferous_Indiana.jpg' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br>The animals below represent the fauna of the Mississippian, when warm shallow seas teemed with invertebrates and early four-limbed vertebrates were beginning to colonise the land.<br><br><a href='https://en.wikipedia.org/wiki/Crinoid' target='_blank'>Crinoid / Sea lily (Crinoidea)</a><br><a href='https://en.wikipedia.org/wiki/Blastoidea' target='_blank'>Blastoid (Blastoidea)</a><br><a href='https://en.wikipedia.org/wiki/Brachiopoda' target='_blank'>Brachiopod (Brachiopoda)</a><br><a href='https://en.wikipedia.org/wiki/Cladoselache' target='_blank'>Cladoselache shark (Cladoselache)</a><br><a href='https://en.wikipedia.org/wiki/Greererpeton' target='_blank'>Greererpeton - early tetrapod (Greererpeton burkemorani)</a><br><a href='https://en.wikipedia.org/wiki/Acanthostega' target='_blank'>Acanthostega (Acanthostega gunnari)</a><br><a href='https://en.wikipedia.org/wiki/Coelacanth' target='_blank'>Coelacanth (Coelacanthiformes)</a><br><a href='https://en.wikipedia.org/wiki/Trilobita' target='_blank'>Trilobite (Trilobita)</a><br><a href='https://en.wikipedia.org/wiki/Rugosa' target='_blank'>Rugose coral (Rugosa)</a><br><a href='https://en.wikipedia.org/wiki/Pederpes' target='_blank'>Pederpes (Pederpes finneyae)</a><br><br>The following plants were spreading across Mississippian landscapes as the first true forests established themselves on land.<br><br><a href='https://en.wikipedia.org/wiki/Archaeopteris' target='_blank'>Archaeopteris - first true tree (Archaeopteris)</a><br><a href='https://en.wikipedia.org/wiki/Lepidodendron' target='_blank'>Early scale tree (Lepidodendron)</a><br><a href='https://en.wikipedia.org/wiki/Calamites' target='_blank'>Early giant horsetail (Calamites)</a><br><a href='https://en.wikipedia.org/wiki/Polypodiopsida' target='_blank'>Fern (Polypodiopsida)</a><br><a href='https://en.wikipedia.org/wiki/Rhacophyton' target='_blank'>Rhacophyton (Rhacophyton)</a><br><a href='https://en.wikipedia.org/wiki/Lycopodium' target='_blank'>Club moss (Lycopodium)</a><br><a href='https://en.wikipedia.org/wiki/Marchantiophyta' target='_blank'>Liverwort (Marchantiophyta)</a><br><a href='https://en.wikipedia.org/wiki/Seed_plant' target='_blank'>Early seed plants (Spermatophyta)</a><br><a href='https://en.wikipedia.org/wiki/Sphenopsida' target='_blank'>Sphenopsid (Sphenopsida)</a><br><a href='https://en.wikipedia.org/wiki/Bryophyta' target='_blank'>Moss (Bryophyta)</a>"></div>

            <div class="hotspot" id="devonian-species" data-title="Notable Species of the Devonian" data-desc="<img src='https://upload.wikimedia.org/wikipedia/commons/thumb/9/96/Large_and_Small_Dunkleosteus_terrelli.jpg/960px-Large_and_Small_Dunkleosteus_terrelli.jpg' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br>The animals below represent the iconic fauna of the Devonian - the Age of Fish - when life first made the transition from sea to land.<br><br><a href='https://en.wikipedia.org/wiki/Dunkleosteus' target='_blank'>Dunkleosteus - giant placoderm (Dunkleosteus terrelli)</a><br><a href='https://en.wikipedia.org/wiki/Tiktaalik' target='_blank'>Tiktaalik - fish-to-land transition (Tiktaalik roseae)</a><br><a href='https://en.wikipedia.org/wiki/Ichthyostega' target='_blank'>Ichthyostega - early tetrapod (Ichthyostega)</a><br><a href='https://en.wikipedia.org/wiki/Acanthostega' target='_blank'>Acanthostega (Acanthostega gunnari)</a><br><a href='https://en.wikipedia.org/wiki/Eusthenopteron' target='_blank'>Eusthenopteron - lobe-finned fish (Eusthenopteron foordi)</a><br><a href='https://en.wikipedia.org/wiki/Bothriolepis' target='_blank'>Bothriolepis - armoured fish (Bothriolepis)</a><br><a href='https://en.wikipedia.org/wiki/Coelacanth' target='_blank'>Early coelacanth (Coelacanthiformes)</a><br><a href='https://en.wikipedia.org/wiki/Trilobita' target='_blank'>Trilobite (Trilobita)</a><br><a href='https://en.wikipedia.org/wiki/Eurypterid' target='_blank'>Sea scorpion (Eurypteridae)</a><br><a href='https://en.wikipedia.org/wiki/Ammonoidea' target='_blank'>Early ammonite (Ammonoidea)</a><br><br>The following plants transformed Devonian landscapes, with the first true trees creating the world's earliest forests.<br><br><a href='https://en.wikipedia.org/wiki/Archaeopteris' target='_blank'>Archaeopteris - first true tree (Archaeopteris)</a><br><a href='https://en.wikipedia.org/wiki/Wattieza' target='_blank'>Wattieza - early tree (Wattieza)</a><br><a href='https://en.wikipedia.org/wiki/Cooksonia' target='_blank'>Cooksonia - early vascular plant (Cooksonia)</a><br><a href='https://en.wikipedia.org/wiki/Psilophyton' target='_blank'>Psilophyton (Psilophyton)</a><br><a href='https://en.wikipedia.org/wiki/Prototaxites' target='_blank'>Prototaxites - giant fungus (Prototaxites)</a><br><a href='https://en.wikipedia.org/wiki/Lycopodium' target='_blank'>Early club moss (Lycopodium)</a><br><a href='https://en.wikipedia.org/wiki/Equisetum' target='_blank'>Early horsetail (Equisetum)</a><br><a href='https://en.wikipedia.org/wiki/Seed_plant' target='_blank'>Early seed plants (Spermatophyta)</a><br><a href='https://en.wikipedia.org/wiki/Polypodiopsida' target='_blank'>Early fern (Polypodiopsida)</a><br><a href='https://en.wikipedia.org/wiki/Marchantiophyta' target='_blank'>Liverwort (Marchantiophyta)</a>"></div>

            <div class="hotspot" id="silurian-species" data-title="Notable Species of the Silurian" data-desc="<img src='https://upload.wikimedia.org/wikipedia/commons/f/f8/Pterygotus_anglicus.JPG' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br>The animals below represent the fauna of the Silurian, when jawed fish appeared for the first time and the first animals ventured permanently onto land.<br><br><a href='https://en.wikipedia.org/wiki/Pterygotus' target='_blank'>Pterygotus - giant sea scorpion (Pterygotus anglicus)</a><br><a href='https://en.wikipedia.org/wiki/Cephalaspis' target='_blank'>Cephalaspis - jawless fish (Cephalaspis)</a><br><a href='https://en.wikipedia.org/wiki/Climatius' target='_blank'>Climatius - early jawed fish (Climatius reticulatus)</a><br><a href='https://en.wikipedia.org/wiki/Trilobita' target='_blank'>Trilobite (Trilobita)</a><br><a href='https://en.wikipedia.org/wiki/Brachiopoda' target='_blank'>Brachiopod (Brachiopoda)</a><br><a href='https://en.wikipedia.org/wiki/Crinoid' target='_blank'>Crinoid / Sea lily (Crinoidea)</a><br><a href='https://en.wikipedia.org/wiki/Orthoceras' target='_blank'>Orthoceras - nautiloid (Orthoceras)</a><br><a href='https://en.wikipedia.org/wiki/Rugosa' target='_blank'>Rugose coral (Rugosa)</a><br><a href='https://en.wikipedia.org/wiki/Scorpion' target='_blank'>Early land scorpion (Scorpiones)</a><br><a href='https://en.wikipedia.org/wiki/Millipede' target='_blank'>Early millipede (Diplopoda)</a><br><br>The following plants represent the earliest colonisers of land - a world still dominated by marine algae.<br><br><a href='https://en.wikipedia.org/wiki/Cooksonia' target='_blank'>Cooksonia - first vascular plant (Cooksonia)</a><br><a href='https://en.wikipedia.org/wiki/Baragwanathia' target='_blank'>Baragwanathia - early club moss (Baragwanathia)</a><br><a href='https://en.wikipedia.org/wiki/Rhyniophyta' target='_blank'>Rhyniophyte (Rhyniophyta)</a><br><a href='https://en.wikipedia.org/wiki/Marchantiophyta' target='_blank'>Liverwort (Marchantiophyta)</a><br><a href='https://en.wikipedia.org/wiki/Bryophyta' target='_blank'>Moss (Bryophyta)</a><br><a href='https://en.wikipedia.org/wiki/Chlorophyta' target='_blank'>Green algae (Chlorophyta)</a><br><a href='https://en.wikipedia.org/wiki/Rhodophyta' target='_blank'>Red algae (Rhodophyta)</a><br><a href='https://en.wikipedia.org/wiki/Phaeophyceae' target='_blank'>Brown algae (Phaeophyceae)</a><br><a href='https://en.wikipedia.org/wiki/Charophyta' target='_blank'>Charophyte algae (Charophyta)</a><br><a href='https://en.wikipedia.org/wiki/Nematophytes' target='_blank'>Nematophyte (Nematophytes)</a>"></div>

            <div class="hotspot" id="ordovician-species" data-title="Notable Life Forms of the Ordovician" data-desc="<img src='https://upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Isotelus_gigas_fossil_trilobite_%28Ordovician%3B_Walcott-Rust_site%2C_New_York_State%2C_USA%29_%2816763508314%29.jpg/960px-Isotelus_gigas_fossil_trilobite_%28Ordovician%3B_Walcott-Rust_site%2C_New_York_State%2C_USA%29_%2816763508314%29.jpg' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br>The animals below represent the extraordinarily diverse marine fauna of the Ordovician. Land had not yet been colonised by animals.<br><br><a href='https://en.wikipedia.org/wiki/Isotelus' target='_blank'>Isotelus - giant trilobite (Isotelus rex)</a><br><a href='https://en.wikipedia.org/wiki/Trilobita' target='_blank'>Trilobite (Trilobita)</a><br><a href='https://en.wikipedia.org/wiki/Orthoceras' target='_blank'>Orthoceras - nautiloid (Orthoceras)</a><br><a href='https://en.wikipedia.org/wiki/Brachiopoda' target='_blank'>Brachiopod (Brachiopoda)</a><br><a href='https://en.wikipedia.org/wiki/Graptolite' target='_blank'>Graptolite (Graptolithina)</a><br><a href='https://en.wikipedia.org/wiki/Crinoid' target='_blank'>Crinoid / Sea lily (Crinoidea)</a><br><a href='https://en.wikipedia.org/wiki/Ostracoda' target='_blank'>Ostracod (Ostracoda)</a><br><a href='https://en.wikipedia.org/wiki/Conodont' target='_blank'>Conodont (Conodonta)</a><br><a href='https://en.wikipedia.org/wiki/Arandaspis' target='_blank'>Arandaspis - early jawless fish (Arandaspis prionotolepis)</a><br><a href='https://en.wikipedia.org/wiki/Eurypterid' target='_blank'>Early sea scorpion (Eurypteridae)</a><br><br>The following represent the primary photosynthetic life forms of the Ordovician. True land plants were only just beginning to appear.<br><br><a href='https://en.wikipedia.org/wiki/Chlorophyta' target='_blank'>Green algae (Chlorophyta)</a><br><a href='https://en.wikipedia.org/wiki/Rhodophyta' target='_blank'>Red algae (Rhodophyta)</a><br><a href='https://en.wikipedia.org/wiki/Phaeophyceae' target='_blank'>Brown algae (Phaeophyceae)</a><br><a href='https://en.wikipedia.org/wiki/Cyanobacteria' target='_blank'>Cyanobacteria (Cyanobacteria)</a><br><a href='https://en.wikipedia.org/wiki/Charophyta' target='_blank'>Charophyte algae (Charophyta)</a><br><a href='https://en.wikipedia.org/wiki/Marchantiophyta' target='_blank'>Early liverwort (Marchantiophyta)</a><br><a href='https://en.wikipedia.org/wiki/Bryophyta' target='_blank'>Early moss (Bryophyta)</a><br><a href='https://en.wikipedia.org/wiki/Dinoflagellate' target='_blank'>Dinoflagellate (Dinoflagellata)</a><br><a href='https://en.wikipedia.org/wiki/Acritarch' target='_blank'>Acritarch - marine microfossil (Acritarcha)</a><br><a href='https://en.wikipedia.org/wiki/Coralline_algae' target='_blank'>Coralline algae (Corallinales)</a>"></div>

            <div class="hotspot" id="cambrian-species" data-title="Notable Life Forms of the Cambrian" data-desc="<img src='https://upload.wikimedia.org/wikipedia/commons/thumb/8/8b/Anomalocaris_eye.jpg/960px-Anomalocaris_eye.jpg' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br>The animals below represent the extraordinary diversity of the Cambrian Explosion, when most major animal body plans first appeared in the fossil record.<br><br><a href='https://en.wikipedia.org/wiki/Anomalocaris' target='_blank'>Anomalocaris - apex predator (Anomalocaris canadensis)</a><br><a href='https://en.wikipedia.org/wiki/Trilobita' target='_blank'>Trilobite (Trilobita)</a><br><a href='https://en.wikipedia.org/wiki/Hallucigenia' target='_blank'>Hallucigenia (Hallucigenia sparsa)</a><br><a href='https://en.wikipedia.org/wiki/Opabinia' target='_blank'>Opabinia (Opabinia regalis)</a><br><a href='https://en.wikipedia.org/wiki/Pikaia' target='_blank'>Pikaia - early chordate (Pikaia gracilens)</a><br><a href='https://en.wikipedia.org/wiki/Wiwaxia' target='_blank'>Wiwaxia (Wiwaxia corrugata)</a><br><a href='https://en.wikipedia.org/wiki/Marrella' target='_blank'>Marrella (Marrella splendens)</a><br><a href='https://en.wikipedia.org/wiki/Ottoia' target='_blank'>Ottoia - priapulid worm (Ottoia prolifica)</a><br><a href='https://en.wikipedia.org/wiki/Brachiopoda' target='_blank'>Brachiopod (Brachiopoda)</a><br><a href='https://en.wikipedia.org/wiki/Aysheaia' target='_blank'>Aysheaia (Aysheaia pedunculata)</a><br><br>The following represent the primary photosynthetic life of the Cambrian. No land plants existed - the land was barren.<br><br><a href='https://en.wikipedia.org/wiki/Cyanobacteria' target='_blank'>Cyanobacteria (Cyanobacteria)</a><br><a href='https://en.wikipedia.org/wiki/Chlorophyta' target='_blank'>Green algae (Chlorophyta)</a><br><a href='https://en.wikipedia.org/wiki/Rhodophyta' target='_blank'>Red algae (Rhodophyta)</a><br><a href='https://en.wikipedia.org/wiki/Phaeophyceae' target='_blank'>Brown algae (Phaeophyceae)</a><br><a href='https://en.wikipedia.org/wiki/Charophyta' target='_blank'>Charophyte algae (Charophyta)</a><br><a href='https://en.wikipedia.org/wiki/Acritarch' target='_blank'>Acritarch - marine microfossil (Acritarcha)</a><br><a href='https://en.wikipedia.org/wiki/Dinoflagellate' target='_blank'>Dinoflagellate (Dinoflagellata)</a><br><a href='https://en.wikipedia.org/wiki/Stromatolite' target='_blank'>Stromatolite - microbial mat (Stromatolite)</a><br><a href='https://en.wikipedia.org/wiki/Diatom' target='_blank'>Early diatom (Bacillariophyta)</a><br><a href='https://en.wikipedia.org/wiki/Archaeplastida' target='_blank'>Archaeplastida (Archaeplastida)</a>"></div>



        </div>
    </div>

    <div id="overlay" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:9998;"></div>
    <div class="tooltip" id="info-bubble">
        <div class="tooltip-content">
            <h3 id="bubble-title">Title</h3>
            <p id="bubble-desc">Description goes here.</p>
        </div>
        <div class="tooltip-footer">
            <button id="close-btn">Close</button>
        </div>
    </div>

    <!-- BOOKMARK: Script  -->
    <script>
        window.addEventListener('load', function () {
            const hotspots = document.querySelectorAll('.hotspot');
            hotspots.forEach(spot => {
                const desc = spot.getAttribute('data-desc');
                const match = desc.match(/src=['"]([^'"]+)['"]/);
                if (match && match[1]) {
                    const preloadImg = new Image();
                    preloadImg.src = match[1];
                }
            });
        });

        const hotspots = document.querySelectorAll('.hotspot');
        const bubble = document.getElementById('info-bubble');
        const bubbleTitle = document.getElementById('bubble-title');
        const bubbleDesc = document.getElementById('bubble-desc');
        const closeBtn = document.getElementById('close-btn');

        function preventBodyTouch(e) {
            if (!bubble.contains(e.target)) {
                e.preventDefault();
            }
        }

        function openBubble() {
            document.getElementById('overlay').style.display = 'block';
            bubble.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            document.addEventListener('touchmove', preventBodyTouch, { passive: false });
            adjustBubbleForZoom();
            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', adjustBubbleForZoom);
            }
        }

        function closeBubble() {
            bubble.style.display = 'none';
            bubble.style.transform = 'translate(-50%, -50%)';
            document.getElementById('overlay').style.display = 'none';
            document.body.style.overflow = '';
            document.removeEventListener('touchmove', preventBodyTouch);
            if (window.visualViewport) {
                window.visualViewport.removeEventListener('resize', adjustBubbleForZoom);
            }
        }

        function adjustScrollPadding() {
            const header = document.getElementById('fixed-header');
            const wrapper = document.getElementById('scroll-wrapper');
            if (header && wrapper) {
                wrapper.style.paddingTop = header.offsetHeight + 'px';
            }
        }

        window.addEventListener('load', adjustScrollPadding);
        window.addEventListener('resize', adjustScrollPadding);

        hotspots.forEach(spot => {
            spot.addEventListener('click', (e) => {
                e.stopPropagation();
                bubbleTitle.textContent = spot.getAttribute('data-title');
                bubbleDesc.innerHTML = spot.getAttribute('data-desc');
                openBubble();
            });
        });

        closeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            closeBubble();
        });

        document.addEventListener('click', (e) => {
            const isClickInsideBubble = bubble.contains(e.target);
            const isClickOnHotspot = Array.from(hotspots).some(spot => spot.contains(e.target));
            if (!isClickInsideBubble && !isClickOnHotspot) {
                closeBubble();
            }
        });

        window.addEventListener('load', function () {
            const container = document.querySelector('.image-container');
            if (container && window.innerWidth < 600) {
                const scrollTarget = (container.scrollWidth - window.innerWidth) / 2;
                window.scrollTo({ left: scrollTarget, top: 0, behavior: 'instant' });
            }
        });



    </script>
