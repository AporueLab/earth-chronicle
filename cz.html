        .tooltip {

            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            color: #ddd;
            border: 1px solid #444;
            border-radius: 14px;

            width: 95vw;
            max-width: 450px;
            max-height: 85vh;
            max-height: 85dvh;
            padding: 5px;
            overflow: hidden;
            z-index: 9999;
            flex-direction: column;
        }

        .tooltip-content {
            padding: 12px;
            text-align: center;
            overflow-y: scroll;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            flex: 1;
            min-height: 0;
        }

        .tooltip-footer {
            padding: 10px 20px;
            text-align: right;
            border-top: 1px solid #444;
            background-color: #222;
            flex-shrink: 0;
        }

            cursor: pointer;

            border: none;
            color: #fff;
            font-size: 16px;
            padding: 5px 14px;
            border-radius: 6px;
            line-height: 1;

        }

            top: 0;
            left: 0;
            width: 100vw;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            text-align: center;
        }

        .tooltip h3 {
            margin: 0 0 10px;
            color: #fff;
            font-size: 1.2rem;
            text-align: center;
        }

        .tooltip p {
            margin: 0;
            font-size: 16px;
            line-height: 1.5;
        }

        .tooltip b {
            color: bisque;
        }

        .tooltip a {
            color: #58a6ff;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
        }

        @media (max-width: 600px) {
            body {
                align-items: flex-start;
            }

            #fixed-header {
                position: fixed;
                width: 100vw;
            }

            #scroll-wrapper {
                width: 200vw;
            }

            .image-container {
                display: inline-block;
                position: relative;
                margin: 0;
                width: 200vw;
            }

            .image-container img {
                width: 200vw;
                max-width: none;
                margin: 0;
                display: block;
            }

            .main-title {
                font-size: 1.1rem;
                position: sticky;
                width: 100vw;
            }

            .main-subtitle {
                font-size: 0.65rem;
                width: 100vw;
                text-align: center;
            }

            .tooltip {
                top: 51%;
                max-height: 69dvh;
                max-height: 69vh;
            }
        }

    <div id="scroll-wrapper">
        <div class="image-container">
            <img src="https://lh3.googleusercontent.com/u/0/d/1ASNSV0cGu1v9WVzPv_-Bo7lvEnJD7KXh" alt="Geologic Time Scale">

            <div class="hotspot" id="cenozoic" data-title="Kenozoikum" data-desc="<b>Období:</b> Před 66 miliony let až do současnosti.<br><br><b>Život:</b> Éra savců. Po vyhynutí neptačích dinosaurů došlo k bouřlivému rozvoji savců a ptáků, kteří obsadili uvolněné ekologické niky. Celosvětové rozšíření travin zásadně proměnilo podobu ekosystémů. Evoluce primátů nakonec vyústila ve vznik lidské linie.<br><br><b>Geologie:</b> Kontinenty se přesunuly do téměř dnešních pozic. Srážka Indie s Asií vyzdvihla pohoří Himálaj. Atlantský oceán se nadále rozšiřoval a Antarktida se izolovala v oblasti jižního pólu.<br><br><b>Klima:</b> Dlouhodobé postupné ochlazování od původního tropického klimatu až po opakované doby ledové v pleistocénu. Hladina CO₂ vytrvale klesala, což vedlo k ústupu hustých lesů a vzniku otevřených plání na většině území světa.<br><br><a href='https://cs.wikipedia.org/wiki/Kenozoikum' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="holocene" data-title="Holocén" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1RIA73b-px9AUVqedKk-cQTvqGh26Ghmi' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Období:</b> Před 11 700 lety až do současnosti.<br><br><b>Život:</b> Všechny moderní druhy ve své současné podobě. Dominantním rysem je rychlé celosvětové rozšíření druhu Homo sapiens, které vedlo k rozsáhlému vymírání megafauny a k prvopočátkům domestikace rostlin a zvířat.<br><br><b>Geologie:</b> Stabilní poloha kontinentů, která je totožná s dnešní. Po posledním glaciálním maximu došlo k výraznému vzestupu hladiny moří, což zásadně změnilo podobu pobřeží po celém světě.<br><br><b>Klima:</b> Teplé a stabilní období meziledové (interglaciál). Mírný přirozený trend ochlazování v posledních 5 000 letech se obrátil a vlivem průmyslové činnosti lidstva nyní dochází k jeho zrychlování.<br><br><a href='https://cs.wikipedia.org/wiki/Holocén' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="pleistocene" data-title="Pleistocén" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1jF2on_hcIUUsbrvPGfGHivbPwBaVKOvw' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Období:</b> Před 2,58 miliony až 11 700 lety.<br><br><b>Život:</b> Domov typické megafauny - mamutů srstnatých, nosorožců srstnatých, jeskynních lvů a obřích pozemních lenochodů. V tomto období se vyvinul druh Homo sapiens a osídlil všechny kontinenty, čímž pravděpodobně spolu s klimatickými změnami přispěl k zániku megafauny.<br><br><b>Geologie:</b> Opakované postupy a ústupy mohutných ledovcových štítů přetvářely krajinu severní polokoule, hloubily údolí a ukládaly morény. Objevily se také pevninské mosty, včetně Beringovy šíje spojující Asii a Severní Ameriku.<br><br><b>Klima:</b> Éra definovaná přibližně 20 glaciálními cykly. Během vrcholného zalednění pokrýval ledovec velkou část Severní Ameriky i severní Evropy a hladina světového oceánu byla o zhruba 120 metrů nižší než dnes.<br><br><a href='https://cs.wikipedia.org/wiki/Pleistocén' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="pliocene" data-title="Pliocén" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1esdgfcaveNULg5fhYz0bCo7bY-acLaEg' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Období:</b> Před 5,3 až 2,6 miliony let.<br><br><b>Život:</b> Raní homininé, včetně australopitéků, se již pohybovali vzpřímeně po afrických savanách. Travnaté plochy se rozšiřovaly na úkor lesů, což svědčilo pasoucím se savcům. Začaly se formovat moderní rody mnoha známých zvířat, jako jsou koně, sloni či velké kočkovité šelmy.<br><br><b>Geologie:</b> Došlo k úplnému uzavření Panamské šíje, která propojila Severní a Jižní Ameriku a spustila velkou americkou biotickou výměnu. Tento proces také změnil směr oceánských proudů, což zásadně ovlivnilo globální klimatické vzorce.<br><br><b>Klima:</b> Svět byl chladnější a sušší než v miocénu. Uzavření panamské mořské cesty narušilo cirkulaci teplých vod v Atlantiku, což ke konci epochy urychlilo nástup zalednění severní polokoule.<br><br><a href='https://cs.wikipedia.org/wiki/Pliocén' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="miocene" data-title="Miocén" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1zQgSQ87mze4gNN3XstDX8Mfj1PtXBeOn' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Období:</b> Před 23 až 5,3 miliony let.<br><br><b>Život:</b> Došlo k rozsáhlému rozvoji lidoopů v Africe a Eurasii, včetně předků dnešních hominidů. Celosvětové šíření travin podnítilo evoluci rychle běhajících býložravců. V oceánech se objevily chaluhoové lesy, které vytvořily podmínky pro nové, bohaté mořské ekosystémy.<br><br><b>Geologie:</b> Srážka Afriky s Eurasií uzavřela starobylé moře Tethys, čímž vznikla Středomořská pánev. Pokračoval výzdvih Alp a Himálaje. Antarktida se vlivem naprosté polární izolace trvale pokryla ledem.<br><br><b>Klima:</b> Po počátečním teplém období následovalo postupné ochlazování. Teplotní vrchol ve středním miocénu vystřídal před 14 miliony let prudký pokles teplot spojený s nárůstem antarktického ledového štítu, což znamenalo přechod k modernímu chladnějšímu klimatu.<br><br><a href='https://cs.wikipedia.org/wiki/Miocén' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="oligocene" data-title="Oligocén" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/138krGY2giqejY2prILCZG3SZkUJtg0ne' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Období:</b> Před 34 až 23 miliony let.<br><br><b>Život:</b> Objevili se a diverzifikovali raní koně, nosorožci a sloni. Husté tropické lesy ustoupily a nahradily je otevřené lesnaté krajiny a první travnaté plochy. Mořský život vzkvétal, přičemž velryby se v tomto období staly výhradně vodními tvory.<br><br><b>Geologie:</b> Antarktida se zcela oddělila od Jižní Ameriky, čímž se otevřel Drakeův průliv a vznikl cirkumpolární proud. Evropa a Asie se k sobě nadále přibližovaly. Krajina v mnoha oblastech středních zeměpisných šířek se stala sušší a otevřenější.<br><br><b>Klima:</b> Výrazné ochlazení na začátku epochy, spojené s otevřením Drakeova průlivu, vedlo k prudkému poklesu globálních teplot. Poprvé se vytvořily trvalé antarktické ledové štíty, což znatelně snížilo hladinu moří.<br><br><a href='https://cs.wikipedia.org/wiki/Oligocén' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="eocene" data-title="Eocén" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1Jt5qt5vcO6yb7L8AYouA2KUozmESP6_X' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Období:</b> Před 56 až 34 miliony let.<br><br><b>Život:</b> Objevily se rané formy koní, velryb, netopýrů a primitivních primátů. Husté tropické a subtropické lesy sahaly až do vysokých zeměpisných šířek, včetně Arktidy. Na všech kontinentech se začaly etablovat moderní řády ptáků a savců.<br><br><b>Geologie:</b> Probíhala aktivní kolize Indie s Asií, čímž započal výzdvih Himálaje. Austrálie se oddělila od Antarktidy. Severní Atlantik se nadále rozšiřoval, když se Grónsko vzdalovalo od Evropy.<br><br><b>Klima:</b> Období začalo paleocenním-eocenním teplotním maximem, nejextrémnějším oteplením za posledních 66 milionů let, kdy globální teploty prudce vzrostly o 5 až 8 stupňů Celsia. Poté následovalo plynulé ochlazování zakončené výrazným zaledněním, které vyvolalo přechod eocén-oligocén.<br><br><a href='https://cs.wikipedia.org/wiki/Eocén' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="paleocene" data-title="Paleocén" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1DlyEATTjkU0q0jAP_QkpWQsyr-RV-WdW' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Období:</b> Před 66 až 56 miliony let.<br><br><b>Život:</b> První epocha po masovém vymírání. Malí, nespecializovaní savci - převážně noční hmyzožravci - se začali rychle vyvíjet a obsazovat uvolněné ekologické niky. Prudkým rozvojem prošli také ptáci. Pravé traviny se ještě nevyvinuly; v krajině dominovaly kapradiny a kvetoucí rostliny tvořící regenerující se lesy.<br><br><b>Geologie:</b> Kontinenty již měly zhruba rozpoznatelný tvar, ale byly k sobě blíže přimknuty. Atlantik byl užší a Indie byla izolovaným ostrovním kontinentem, který se rychle pohyboval na sever směrem k Asii.<br><br><b>Klima:</b> Teplé a relativně stabilní napříč zeměpisnými šířkami, zcela bez polárního zalednění. Tropické a subtropické podmínky zasahovaly hluboko do oblastí dnešní mírné Evropy a Severní Ameriky. Hladina CO₂ byla v důsledku dopadu na rozhraní křídy a paleogénu vysoká.<br><br><a href='https://cs.wikipedia.org/wiki/Paleocén' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="k-pg-extinction" data-title="Vymírání na rozhraní křídy a paleogénu" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1vhCuGC8hP-6NPH1eZh-2u3v7D-q_TjUX' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Období:</b> Před 66 miliony let.<br><br><b>Příčina:</b> Asteroid o průměru 10 až 15 km dopadl na poloostrov Yucatán a uvolnil energii odpovídající miliardám jaderných bomb. Následovaly rozsáhlé požáry, několikaletá impaktní zima způsobená vyvrženým materiálem blokujícím sluneční svit a následné skleníkové oteplování.<br><br><b>Vymírání:</b> Zaniklo přibližně 75 % všech tehdejších druhů, včetně všech neptačích dinosaurů, ptakoještěrů, amonitů, mosasaurů a velkých mořských plazů. Přeživší druhy tvořili převážně drobní živočichové žijící v norách nebo ve vodním prostředí.<br><br><b>Význam:</b> Tato událost definitivně ukončila éru druhohor a zcela změnila směr vývoje života na Zemi. Bez tohoto zásahu by se savci - a následně i lidé - pravděpodobně nikdy nestali dominantními tvory.<br><br><a href='https://cs.wikipedia.org/wiki/Vymírání_na_konci_křídy' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="mesozoic" data-title="Mezozoikum" data-desc="<b>Období:</b> Před 252 až 66 miliony let.<br><br><b>Život:</b> Éra plazů. Souši dominovali dinosauři, nebi vládli ptakoještěři a moře obývali ichtyosauři a plesiosauři. Během této éry se také objevily první kvetoucí rostliny, ptáci a drobní savci.<br><br><b>Geologie:</b> Na počátku existoval jediný superkontinent Pangea, který se postupně rozpadl na severní Laurasii a jižní Gondwanu a nakonec na pevninské celky, jak je známe dnes.<br><br><b>Klima:</b> Převážně teplé a zcela bez zalednění, s vysokou koncentrací CO₂ a hladinou moří výrazně vyšší než v současnosti. Neexistovaly žádné trvalé polární čepičky a velkou část kontinentů pokrývala mělká moře.<br><br><a href='https://cs.wikipedia.org/wiki/Mezozoikum' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="cretaceous" data-title="Křída" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1NLcQX-yTb_k7D_xdkBL77xKcvkhPa8Rq' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Období:</b> Před 145 až 66 miliony let.<br><br><b>Život:</b> Vrchol rozmanitosti dinosaurů - včetně rodů Tyrannosaurus, Triceratops a Velociraptor. Došlo k evoluci a rychlému rozšíření kvetoucích rostlin, které zásadně proměnilo podobu krajiny. Objevil se první sociální hmyz. Přítomni byli již drobní placentální i vačnatí savci, zatím však tvořili jen okrajovou část fauny.<br><br><b>Geologie:</b> Pokračoval rozpad Gondwany, při kterém se od sebe oddělovaly Afrika, Jižní Amerika, Indie a Antarktida. Rozsáhlé vnitrozemské moře rozdělilo Severní Ameriku na dvě části. Ke konci období započal výzdvih Skalnatých hor.<br><br><b>Klima:</b> Velmi teplé a v podstatě bez zalednění, přičemž hladina moří dosahovala jedněch z nejvyšších hodnot v historii Země. Koncentrace CO₂ byla několikanásobně vyšší než dnes. Období bylo náhle ukončeno dopadem asteroidu na rozhraní křídy a paleogénu.<br><br><a href='https://cs.wikipedia.org/wiki/K%C5%99%C3%ADda' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="jurassic" data-title="Jura" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1Rnuy2ok6MkWRO9qihZBbwB0D45uWW_G4' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Období:</b> Před 201 až 145 miliony let.<br><br><b>Život:</b> Dominantou byli obří sauropodní dinosauři - největší suchozemští živočichové v dějinách Země - spolu s dravými teropody. Z malých opeřených dinosaurů se vyvinuli první ptáci. Jehličnany, kapradiny a cykasy tvořily rozsáhlé bujné lesy. Raní savci zůstávali drobní a vedli převážně noční způsob života.<br><br><b>Geologie:</b> Pangea se aktivně rozpadala na Laurasii a Gondwanu a začal se otevírat centrální Atlantský oceán. Přes Evropu a části Severní Ameriky se rozlévala mělká moře. Podél nových riftových zón probíhala intenzivní vulkanická činnost.<br><br><b>Klima:</b> Teplý a vlhký <i>skleníkový svět</i> zcela bez polárního zalednění. Vysoká vlhkost a hladina CO₂ podporovaly růst husté vegetace, která živila obrovská stáda sauropodů. Sezónní výkyvy byly v porovnání s dneškem mírné.<br><br><a href='https://cs.wikipedia.org/wiki/Jura' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="triassic" data-title="Trias" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1oIivBIlrsl7ZID8VwBbmOL9aaKgqbQnZ' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Období:</b> Před 252 až 201 miliony let.<br><br><b>Život:</b> Život se pomalu vzpamatovával z masového vymírání na konci permu. Koncem triasu se objevili první skuteční dinosauři, zpočátku jako malí dvounozí živočichové. Vyvinuli se také první savci - drobní, noční tvorové podobní rejskům. Oceány osídlili mořští plazi, včetně ichtyosaurů.<br><br><b>Geologie:</b> Souš tvořil jediný superkontinent Pangea s rozsáhlým vyprahlým vnitrozemím, které bylo příliš vzdálené od zmírňujícího vlivu oceánu. Na východní straně tvořilo moře Tethys velký tropický záliv. Typickým geologickým záznamem z tohoto období jsou rozsáhlé pouště s červenými pískovci.<br><br><b>Klima:</b> Ve většině vnitrozemí panovalo horké a suché podnebí, zatímco u pobřeží se projevovaly silné monzunové systémy. Polární zalednění neexistovalo. Konec triasu provázely masivní sopečné erupce v důsledku počínajícího rozpadu Pangey, což vyvolalo další vymírání, které uvolnilo cestu k dominanci dinosaurů.<br><br><a href='https://cs.wikipedia.org/wiki/Trias' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="p-t-extinction" data-title="Vymírání na rozhraní permu a triasu" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1w-xgECTNk86yTNZ5MJL5rn75xJwaqYhy' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Období:</b> Před 252 miliony let.<br><br><b>Příčina:</b> Masivní sopečné erupce v oblasti dnešní Sibiře - tzv. sibiřské trapy - uvolňovaly po desetitisíce let obrovské množství CO₂ a toxických plynů. To vyvolalo nekontrolované globální oteplování, okyselování oceánů a rozsáhlý úbytek kyslíku v mořích.<br><br><b>Vymírání:</b> Nejzávažnější hromadné vymírání v dějinách Země. Odhaduje se, že zaniklo 96 % mořských druhů a 70 % suchozemských obratlovců. Celé skupiny - například trilobiti, poupěnci či většina korálových linií - zmizely navždy.<br><br><b>Význam:</b> Obnova ekosystémů trvala přibližně 10 milionů let, což je mnohem déle než po vymírání na konci křídy. Ekologické vakuum po „velkém vymírání“ umožnilo archosaurům - předkům dinosaurů a krokodýlů - získat v triasu dominantní postavení.<br><br><a href='https://cs.wikipedia.org/wiki/Permsk%C3%A9_vym%C3%ADr%C3%A1n%C3%AD' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="paleozoic" data-title="Paleozoikum" data-desc="<b>Období:</b> Před 541 až 252 miliony let.<br><br><b>Život:</b> Éra začala kambrickou explozí druhové rozmanitosti v mořích a skončila nejzávažnějším hromadným vymíráním v dějinách Země. Během této éry život osídlil souš, objevily se první lesy, hmyz ovládl vzduch a první obratlovci v podobě čtyřnožců vystoupili na břeh.<br><br><b>Geologie:</b> Postupné srážky kontinentů vedly ke konci éry ke vzniku superkontinentu Pangea. V tomto období se vytvořila Appalačská a Kaledonská pohoří, která svou tehdejší výškou konkurovala dnešnímu Himálaji.<br><br><b>Klima:</b> Během 289 milionů let bylo klima velmi proměnlivé - od extrémního ordovického zalednění přes teplé skleníkové období devonu a karbonu až po permské ochlazení a následné katastrofální oteplování při vymírání na rozhraní permu a triasu.<br><br><a href='https://cs.wikipedia.org/wiki/Paleozoikum' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="permian" data-title="Perm" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1Uq70iPwIrUjRkaBkXnhvIcUIJ3Hx4NMH' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Období:</b> Před 299 až 252 miliony let.<br><br><b>Život:</b> Dominantními velkými živočichy na souši byli synapsidi - skupina, z níž se později vyvinuli savci - včetně rodu Dimetrodon s charakteristickou hřbetní plachtou. Bažinaté uhelné pralesy nahradily jehličnany a kapraďosemenné rostliny. Hmyz se dále diverzifikoval a poprvé se objevili brouci.<br><br><b>Geologie:</b> Pangea byla již zcela zformována a tvořila jediný obří superkontinent s rozsáhlým vnitrozemím izolovaným od vlivu oceánu. Východní břehy omývalo moře Tethys. V raném permu v jižních částech Gondwany stále přetrvávaly mohutné ledovce.<br><br><b>Klima:</b> Původně chladný a zaledněný svět se postupně měnil v čím dál teplejší a sušší prostředí, jak vnitrozemí Pangey vysychalo. Období skončilo katastrofálním oteplováním vyvolaným sopečnou činností během vymírání na rozhraní permu a triasu.<br><br><a href='https://cs.wikipedia.org/wiki/Perm' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="pennsylvanian" data-title="Svrchní karbon" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1gdx-edvvTFWoGCRo4LbaMwrFrtjF2vrT' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Období:</b> Před 323 až 299 miliony let.<br><br><b>Život:</b> Rozsáhlé uhelné pralesy, v nichž dominovaly obří plavuně, přesličky a stromovité kapradiny dosahující výšky až 30 metrů. Vyvinuli se první plazi, schopní klást vejce na souši. V atmosféře bohaté na kyslík vzkvétal obří hmyz - například příbuzní dnešních vážek s rozpětím křídel až 70 cm.<br><br><b>Geologie:</b> Srážka Gondwany s Euramerikou aktivně formovala Appalačské a Hercynské pohoří. V rozsáhlých nížinných bažinách se hromadila biomasa, ze které vznikla většina světových zásob černého uhlí.<br><br><b>Klima:</b> Chladné a vlhké s opakovaným zaledněním na jižní polokouli. Koncentrace kyslíku v atmosféře byla výrazně vyšší než dnes - přibližně 35 % oproti současným 21 % - což umožnilo existenci obřího hmyzu a vedlo k častým rozsáhlým požárům.<br><br><a href='https://cs.wikipedia.org/wiki/Karbon' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="mississippian" data-title="Spodní karbon" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/19RtdNjnliesBofaXvY2qMTIdefuUiQpH' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Období:</b> Před 359 až 323 miliony let.<br><br><b>Život:</b> Teplá mělká moře kypěla životem - hojně se vyskytovali lilijice, poupěnci a mechovky, jejichž schránky vytvořily mocná vápencová ložiska. Na souši se diverzifikovali raní čtyřnožci spolu s primitivními obojživelníky. Začaly se šířit semenné rostliny, čímž se snížila závislost reprodukce na vodním prostředí.<br><br><b>Geologie:</b> Vysoká hladina moří zaplavila rozsáhlé kontinentální šelfy, zejména v Severní Americe a Evropě, a zanechala po sobě mohutné vápencové formace, které jsou pro toto období typické. Pevninské bloky pokračovaly v pomalé kolizi směřující ke vzniku superkontinentu Pangea.<br><br><b>Klima:</b> Zpočátku teplé a vlhké s vysokou hladinou moří a rozsáhlými tropickými vodami. Ochlazování ke konci období přispělo k poklesu mořské hladiny a k počátkům karbonského zalednění, které se naplno projevilo ve svrchním karbonu.<br><br><a href='https://cs.wikipedia.org/wiki/Karbon' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="devonian" data-title="Devon" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1wonovQ-93w7lMTlHnDyH13PugY1OKe7s' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Období:</b> Před 419 až 359 miliony let.<br><br><b>Život:</b> Známý jako „věk ryb“. Mořím dominovali mohutně pancéřovaní placodermi, včetně obřího dravce rodu Dunkleosteus. Na souši se objevily první skutečné lesy a lalokoploutvé ryby zahájily přechod k suchozemským čtyřnožcům. Objevila se také první semena, což znamenalo revoluci v rozmnožování rostlin.<br><br><b>Geologie:</b> Srážkou Laurentie a Baltiky vznikl superkontinent Euramerika, čímž bylo vyzdviženo Kaledonské pohoří v oblasti dnešního Skotska a Skandinávie. Gondwana se nacházela na jižní polokouli. Tropické mělčiny pokrývaly rozsáhlé útesové systémy tvořené stromatoporami a korály.<br><br><b>Klima:</b> Zpočátku teplé a v podstatě bez zalednění. Rozšiřování lesů vedlo k výraznému poklesu atmosférického CO₂, což ke konci období ochladilo klima. To pravděpodobně přispělo k pozdně devonskému vymírání, při němž zaniklo asi 75 % druhů.<br><br><a href='https://cs.wikipedia.org/wiki/Devon_(geologie)' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="silurian" data-title="Silur" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1l64QkVP_x12tpLdPuDdYNlGROedlSEuM' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Období:</b> Před 444 až 419 miliony let.<br><br><b>Život:</b> Poprvé se objevily čelistnaté ryby, což představovalo zásadní evoluční skok. Cévnaté rostliny s pravými stonky začaly osidlovat souš, doprovázeny prvními suchozemskými členovci, jako byly mnohonožky a raní pavoukovci. V teplých mělkých mořích došlo k výraznému rozmachu korálových útesů.<br><br><b>Geologie:</b> Po ordovickém zalednění hladina moří výrazně stoupla, což zaplavilo kontinentální šelfy a vytvořilo prostředí teplých mělkých moří. Srážka Avalonie s Laurentií začala uzavírat oceán Iapetus, čímž byly položeny základy pro pozdější vznik Eurameriky.<br><br><b>Klima:</b> Teplé a stabilní klima po drsném zalednění na konci ordoviku. Hladina CO₂ byla vysoká, globální teploty výrazně převyšovaly dnešní průměry a polární oblasti byly bez trvalého ledu. Z klimatického hlediska se jednalo o jedno z nejklidnějších období v dějinách Země.<br><br><a href='https://cs.wikipedia.org/wiki/Silur' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="ordovician" data-title="Ordovik" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1BGoBGfTSbGWF-B973gan0pZy2HPFDq4C' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Období:</b> Před 485 až 444 miliony let.<br><br><b>Život:</b> Mořský život byl mimořádně rozmanitý - mořím dominovali trilobiti, ramenonožci, hlavonožci a ostnokožci. Poblíž pobřeží se objevily první primitivní suchozemské rostliny - drobné formy podobné mechům. Přítomny byly i bezčelistnaté ryby, které však stále tvořily jen okrajovou složku fauny.<br><br><b>Geologie:</b> Dominantní pevninskou masou byla Gondwana, která se posouvala přes jižní pól. Oceán Iapetus ji odděloval od menších kontinentů Laurentie a Baltiky. Velkou část kontinentálních šelfů pokrývala rozsáhlá mělká tropická moře.<br><br><b>Klima:</b> Období začalo jako teplé s vysokou hladinou CO₂ i moří, ale skončilo náhlým a prudkým zaledněním, když se Gondwana přesunula nad jižní pól. Toto zalednění způsobilo výrazný pokles hladiny moří a vyvolalo hromadné vymírání na konci ordoviku, druhé největší v dějinách Země, při kterém zaniklo přibližně 85 % druhů.<br><br><a href='https://cs.wikipedia.org/wiki/Ordovik' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="cambrian" data-title="Kambrium" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/19knfKZNwhB2IDLj2a67RtG8lc0vkm4Pv' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Období:</b> Před 541 až 485 miliony let.<br><br><b>Život:</b> Kambrická exploze - jedna z nejvýznamnějších událostí v dějinách života. Většina hlavních tělesných plánů živočichů se objevila v geologicky krátkém časovém úseku. Moře bohatá na kyslík obývali tvorové jako Anomalocaris, Hallucigenia a trilobiti. V rychlém sledu se vyvinuly oči, schránky, končetiny i žábry.<br><br><b>Geologie:</b> Jižní polokouli dominoval superkontinent Gondwana. Kontinenty Laurentie, Baltika a Sibiř byly samostatné pevninské celky v tropických až subtropických šířkách. Rozšířená byla mělká, teplá kontinentální moře.<br><br><b>Klima:</b> Globálně teplé, bez důkazů o polárním zalednění. Vysoké hladiny CO₂ a teplé oceány podporovaly explozivní rozvoj mořského života. Hladina moří byla vysoká, zaplavovala rozsáhlé části kontinentů a vytvářela mělkovodní biotopy, v nichž vzkvétala kambrická fauna.<br><br><a href='https://cs.wikipedia.org/wiki/Kambrium' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="proterozoic" data-title="Proterozoikum" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1puflGlHCgS28ybO4HzdLNcdSLP2Bx_CO' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Období:</b> Před 2,5 miliardami až 541 miliony let.<br><br><b>Život:</b> Před přibližně 1,8 miliardami let se objevili první eukaryoti - buňky s jádrem, což představovalo zásadní skok v komplexitě. Následovaly první mnohobuněčné organismy, vrcholící ediakarskou faunou: záhadnými živočichy s měkkým tělem, kteří představují nejstarší známé formy života na úrovni živočichů.<br><br><b>Geologie:</b> Proběhlo několik cyklů vzniku a rozpadu superkontinentů, včetně zformování a následného dělení Rodinie před zhruba 1 miliardou let. Kontinenty se opakovaně formovaly a podléhaly erozi. Z tohoto eonu pocházejí nejstarší rozpoznatelné horské pásy a sedimentární pánve.<br><br><b>Klima:</b> Zahrnovalo nejextrémnější zalednění v dějinách Země - události známé jako „Země - sněhová koule“, během nichž ledovcové štíty pravděpodobně sahaly až k rovníku. Tato období střídaly teplé skleníkové intervaly vyvolané nahromaděním sopečného CO₂. Velká oxidační událost před zhruba 2,4 miliardami let trvale změnila atmosféru a umožnila pozdější vznik komplexního života.<br><br><a href='https://cs.wikipedia.org/wiki/Proterozoikum' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="archean" data-title="Archaikum" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/10Tr6IjnPuPfVmJltaAyPSsBz7LGb4eGb' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Období:</b> Před 4 až 2,5 miliardami let.<br><br><b>Život:</b> Život existoval, ale výhradně ve formě jednobuněčných prokaryot - bakterií a archeí. Stromatolity, vrstevnaté biogenní útvary tvořené fotosyntetizujícími sinicemi, patří mezi nejstarší fosilní důkazy života a začaly do atmosféry pomalu uvolňovat kyslík.<br><br><b>Geologie:</b> Vznikly první stabilní kontinentální kratony - prastará jádra hornin, která dodnes tvoří středy moderních kontinentů. Zemská kůra byla tenčí a mobilnější než dnes, s intenzivní sopečnou činností. Neexistovala žádná velká pohoří; povrchu dominovala mělká moře a sopečné ostrovy.<br><br><b>Klima:</b> Atmosféra se skládala převážně z dusíku a CO₂, bez volného kyslíku. I přesto, že Slunce zářilo přibližně o 30 % méně než dnes, vysoké koncentrace skleníkových plynů udržely vodu na povrchu v kapalném stavu. Teploty byly pravděpodobně vyšší než dnešní průměry a většinu povrchu pokrýval globální oceán.<br><br><a href='https://cs.wikipedia.org/wiki/Archaikum' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="earth-formation" data-title="Raná Země" data-desc="<img src='https://lh3.googleusercontent.com/u/0/d/1QwV8g5J4RS84qRaxBKAK6efyeRfyWKpr' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br><b>Období:</b> Před 4,54 miliardami let - eon hadaikum (před 4,54 až 4 miliardami let).<br><br><b>Život:</b> Žádný. Povrch byl zcela nehostinný - tavenina nebo prostředí pod intenzivním bombardováním, kde po většinu období neexistovala stabilní kapalná voda. Některé geochemické nálezy naznačují, že mikrobiální život se mohl objevit ke konci hadaikum, ale neexistují žádné potvrzené fosilie.<br><br><b>Geologie:</b> Země vznikla z prachoplynové mlhoviny postupným nabalováním hmoty při kolizích planetesimál. Do proto-Země narazilo těleso o velikosti Marsu a vyvržený materiál vytvořil Měsíc. Povrch byl převážně roztavený. Nejstarší známé minerály - krystaly zirkonu z Austrálie - pocházejí z doby před 4,4 miliardami let, což naznačuje, že kapalná voda existovala překvapivě brzy.<br><br><b>Klima:</b> Intenzivní teplo z narůstání hmoty, radioaktivního rozpadu a častých dopadů meteoritů udržovalo povrch v roztaveném či polotekutém stavu. Planetu obklopovala hustá atmosféra z vodní páry a CO₂. Jak Země postupně chladla, pára kondenzovala a vytvořila první oceány - základ pro vše, co následovalo.<br><br><a href='https://cs.wikipedia.org/wiki/Hadaikum' target='_blank'>Wikipedia</a>"></div>

            <div class="hotspot" id="pleistocene-species" data-title="Významné druhy pleistocénu" data-desc="<img src='https://upload.wikimedia.org/wikipedia/commons/thumb/a/ad/Siegsdorfer_Mammut.jpg/960px-Siegsdorfer_Mammut.jpg' style='width:85%; display:block; margin:12px auto 12px auto; border-radius:6px;'><br>Níže uvedení živočichové patřili k nejcharakterističtější velká fauně pleistocénu. Mnohé z těchto druhů zmizely během masového vymírání pleistocenní megafauny.<br><br><a href='https://cs.wikipedia.org/wiki/Mamut_srstnat%C3%BD' target='_blank'>Mamut srstnatý (Mammuthus primigenius)</a><br><a href='https://cs.wikipedia.org/wiki/Nosoro%C5%BEec_srstnat%C3%BD' target='_blank'>Nosorožec srstnatý (Coelodonta antiquitatis)</a><br><a href='https://cs.wikipedia.org/wiki/Lev_jeskynn%C3%AD' target='_blank'>Lev jeskynní (Panthera spelaea)</a><br><a href='https://cs.wikipedia.org/wiki/Smilodon' target='_blank'>Šavlozubý tygr (Smilodon fatalis)</a><br><a href='https://cs.wikipedia.org/wiki/Megatherium' target='_blank'>Obří pozemní lenochod (Megatherium americanum)</a><br><a href='https://cs.wikipedia.org/wiki/Megaloceros' target='_blank'>Veledaněk obrovský (Megaloceros giganteus)</a><br><a href='https://cs.wikipedia.org/wiki/Medv%C4%9Bd_jeskynn%C3%AD' target='_blank'>Medvěd jeskynní (Ursus spelaeus)</a><br><a href='https://cs.wikipedia.org/wiki/Homo_sapiens' target='_blank'>Člověk moudrý (Homo sapiens)</a><br><a href='https://cs.wikipedia.org/wiki/Neandrt%C3%A1lec' target='_blank'>Neandrtálec (Homo neanderthalensis)</a><br><a href='https://cs.wikipedia.org/wiki/Aenocyon_dirus' target='_blank'>Vlk strašný (Aenocyon dirus)</a><br><br>Následující rostliny byly široce rozšířeny v pleistocenní krajině, zejména během střídání glaciálních a interglaciálních cyklů.<br><br><a href='https://cs.wikipedia.org/wiki/Lipnicovit%C3%A9' target='_blank'>Trávy (čeleď Poaceae)</a><br><a href='https://cs.wikipedia.org/wiki/B%C5%99%C3%ADza' target='_blank'>Bříza (Betula)</a><br><a href='https:     <div id="overlay" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:9998;"></div>
    <div class="tooltip" id="info-bubble">
        <div class="tooltip-content">
            <h3 id="bubble-title">Title</h3>
            <p id="bubble-desc">Description goes here.</p>
        </div>
        <div class="tooltip-footer">
            <button id="close-btn">Zavřít</button>
        </div>
    </div>

    <!-- BOOKMARK: Script  -->
    <script>
        window.addEventListener('load', function () {
            const hotspots = document.querySelectorAll('.hotspot');
            hotspots.forEach(spot => {
                const desc = spot.getAttribute('data-desc');
                const match = desc.match(/src=['"]([^'"]+)['"]/);
                if (match && match[1]) {
                    const preloadImg = new Image();
                    preloadImg.src = match[1];
                }
            });
        });

        const hotspots = document.querySelectorAll('.hotspot');
        const bubble = document.getElementById('info-bubble');
        const bubbleTitle = document.getElementById('bubble-title');
        const bubbleDesc = document.getElementById('bubble-desc');
        const closeBtn = document.getElementById('close-btn');

        function preventBodyTouch(e) {
            if (!bubble.contains(e.target)) {
                e.preventDefault();
            }
        }

        function openBubble() {
            document.getElementById('overlay').style.display = 'block';
            bubble.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            document.addEventListener('touchmove', preventBodyTouch, { passive: false });
            adjustBubbleForZoom();
            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', adjustBubbleForZoom);
            }
        }

        function closeBubble() {
            bubble.style.display = 'none';
            bubble.style.transform = 'translate(-50%, -50%)';
            document.getElementById('overlay').style.display = 'none';
            document.body.style.overflow = '';
            document.removeEventListener('touchmove', preventBodyTouch);
            if (window.visualViewport) {
                window.visualViewport.removeEventListener('resize', adjustBubbleForZoom);
            }
        }

        function adjustScrollPadding() {
            const header = document.getElementById('fixed-header');
            const wrapper = document.getElementById('scroll-wrapper');
            if (header && wrapper) {
                wrapper.style.paddingTop = header.offsetHeight + 'px';
            }
        }

        window.addEventListener('load', adjustScrollPadding);
        window.addEventListener('resize', adjustScrollPadding);

        hotspots.forEach(spot => {
            spot.addEventListener('click', (e) => {
                e.stopPropagation();
                bubbleTitle.textContent = spot.getAttribute('data-title');
                bubbleDesc.innerHTML = spot.getAttribute('data-desc');
                openBubble();
            });
        });

        closeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            closeBubble();
        });

        document.addEventListener('click', (e) => {
            const isClickInsideBubble = bubble.contains(e.target);
            const isClickOnHotspot = Array.from(hotspots).some(spot => spot.contains(e.target));
            if (!isClickInsideBubble && !isClickOnHotspot) {
                closeBubble();
            }
        });

        window.addEventListener('load', function () {
            const container = document.querySelector('.image-container');
            if (container && window.innerWidth < 600) {
                const scrollTarget = (container.scrollWidth - window.innerWidth) / 2;
                window.scrollTo({ left: scrollTarget, top: 0, behavior: 'instant' });
            }
        });



    </script>
